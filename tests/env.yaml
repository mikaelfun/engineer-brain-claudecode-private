# ============================================================
# 路径配置（POSIX 格式 — Git Bash）
# ============================================================
paths:
  project_root: "/c/Users/fangkun/Documents/Claude Code Projects/EngineerBrain"
  cases_root: "/c/Users/fangkun/Documents/Claude Code Projects/EngineerBrain/cases"
  tests_root: "/c/Users/fangkun/Documents/Claude Code Projects/EngineerBrain/tests"
  backup_dir: "/tmp/test-framework-backup"

# ============================================================
# Loop 配置
# ============================================================
loop:
  interval_minutes: 8
  max_rounds: 50
  # 每轮最大耗时（超时则中断当前 agent，进入下一轮）
  round_timeout_minutes: 7
  # 连续 N 轮全 PASS 后自动切换到更大间隔
  auto_slow_after_consecutive_pass: 5
  slow_interval_minutes: 15

# ============================================================
# 自动化行为开关
# ============================================================
automation:
  # autoImplementTracked: true 时，SCAN 阶段发现 tracked+planned issue
  # 会自动 spawn conductor:implement 实现。默认 false（保守策略）。
  # ⚠️ 开启后每轮 SCAN 最多自动实现 max_auto_implement_per_round 个 issue。
  autoImplementTracked: false
  max_auto_implement_per_round: 1
