# Test Environment Configuration
# 每轮测试开始前必读 — 避免重复猜测环境参数
# 修改此文件后立即生效（下轮 loop 自动读取）

# ============================================================
# Dashboard 服务
# ============================================================
dashboard:
  backend_port: 3010
  frontend_port: 5173
  base_url: "http://localhost:5173"
  api_base: "http://localhost:3010"
  # JWT 生成方式（在 dashboard 目录下执行）
  jwt_generate: >
    node -e "const jwt=require('jsonwebtoken');
    console.log(jwt.sign({sub:'engineer'},
    process.env.JWT_SECRET||'engineer-brain-local-dev-secret-2026',
    {expiresIn:'1h'}))"
  # 启动命令（仅在服务未运行时使用）
  start_command: "cd dashboard && npm run dev"
  # 检查是否在线
  health_check: "curl -sf http://localhost:3010/api/health"

# ============================================================
# Playwright 配置
# ============================================================
playwright:
  browser: "msedge"
  headless: false
  # 截图配置
  screenshot:
    type: "jpeg"
    quality: 60
    save_dir: "tests/results/screenshots"
    # 绝不传回会话，只保存到文件
    never_return_to_session: true
  # 窗口大小（较小以减少截图体积）
  viewport:
    width: 1280
    height: 720

# ============================================================
# Sub-Agent 配置
# ============================================================
agents:
  # UI 测试用 opus — 截图视觉分析需要强模型
  ui_test_agent:
    model: "opus"
    tools: []  # 只用 Playwright MCP，不需要其他 tools
    mcp_servers: ["playwright"]
    max_turns: 15
    # 在 subagent 内部 browser_snapshot 可以用
    # 因为 subagent context 隔离，用完即弃
    allow_snapshot_inside: true
  # FIX 阶段用 opus — 需要更强分析能力
  fix_agent:
    model: "opus"
    tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    max_turns: 20
  # SCAN/GENERATE 用 sonnet — 平衡速度和质量
  scan_agent:
    model: "sonnet"
    tools: ["Bash", "Read", "Glob", "Grep"]
    max_turns: 10

# ============================================================
# Case 测试池 (DEPRECATED — 迁移到 tests/fixtures/live-cases.yaml)
# select_live_case() 优先读 live-cases.yaml，此处作为 fallback
# ============================================================
