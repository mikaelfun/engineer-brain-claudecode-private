id: "api-issue-implement"
name: "Issue Implement Endpoint — POST /api/issues/:id/start-implement"
category: "backend-api"
source: "dashboard/src/routes/issues.ts — POST /issues/:id/start-implement"
description: "验证 issue 启动实现端点：创建测试 issue 并跟踪，验证 start-implement 端点可达，对未 tracked issue 拒绝（400/422），对 tracked issue 接受（200/202）"
safety_level: "safe"
priority: "medium"
tags: ["api", "issues", "implement", "state-machine", "round-11"]

steps:
  # Step 1: Create a test issue
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues"
      body: '{"title":"TEST-AUTO: implement endpoint test","type":"feature","priority":"P3","description":"Automated test — will be deleted"}'
      auth: true
    safety_check: "api.safe[POST /api/issues]"
    expected_status: [200, 201]

  # Step 2: Try start-implement on pending issue (should reject — needs to be tracked first)
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues/{created_issue_id}/start-implement"
      auth: true
      expected_status: [400, 409, 422]
    safety_check: "api.safe[POST /api/issues]"

  # Step 3: Check implement-status endpoint
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/issues/{created_issue_id}/implement-status"
      auth: true
      expected_status: [200, 404]
    safety_check: "api.safe[GET /api/issues]"

assertions:
  - type: "status_code"
    target: "POST /api/issues (create)"
    expected: [200, 201]
    description: "测试 issue 创建成功"

  - type: "status_code"
    target: "POST /api/issues/:id/start-implement (pending issue)"
    expected: [400, 409, 422]
    description: "未 tracked 的 issue 不能启动实现（状态机拒绝）"

  - type: "status_code"
    target: "GET /api/issues/:id/implement-status"
    expected: [200, 404]
    description: "implement-status 端点可访问"

teardown:
  - action: "http_request"
    params:
      method: "DELETE"
      url: "{api_base}/api/issues/{created_issue_id}"
      auth: true
    safety_check: "api.safe[DELETE /api/issues/:id]"

timeout_seconds: 30
