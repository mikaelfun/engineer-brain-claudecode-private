id: iss-192-save-api
name: "ISS-192: Save Draft API — Persists Edit to .md File on Disk"
category: backend-api
source: "issues/ISS-192.json (AC: Save persists edits to .md file on disk via API)"
safety_level: safe
recipe_used: issue-driven-api.md
issueId: ISS-192
priority: P1
data_source: live
description: >
  Verifies that PUT/PATCH to the draft save endpoint writes the updated content
  to the corresponding .md file on disk, and that GET after save returns the
  updated content.

steps:
  - action: api_call
    params:
      method: GET
      url: "http://localhost:3010/api/cases/{live_case_id}/drafts"
      description: "Get current drafts list"
  - action: extract
    params:
      field: "drafts[0].filename"
      into: "draft_filename"
  - action: api_call
    params:
      method: PUT
      url: "http://localhost:3010/api/drafts/{live_case_id}/{draft_filename}"
      body:
        filename: "{draft_filename}"
        content: "# Test Edit\n\nUpdated content for test."
      description: "Save draft via API"
  - action: api_call
    params:
      method: GET
      url: "http://localhost:3010/api/cases/{live_case_id}/drafts"
      description: "Re-fetch drafts after save"
  - action: read_file
    params:
      path: "{cases_root}/active/{live_case_id}/{draft_filename}"
      description: "Read draft file from disk"

assertions:
  - type: status_code
    expected: 200
    when: after_save
    description: "Save API returns 200"
  - type: file_content_contains
    expected: "Updated content for test"
    description: "Disk file contains updated content after save"
  - type: api_response_contains
    field: "content"
    expected: "Updated content for test"
    when: after_get
    description: "GET draft returns updated content"

tags: [api, draft, save, persistence, ISS-192]
createdAt: "2026-04-01"
createdByCycle: 42
