id: "api-core-endpoints"
name: "Core API Endpoints — 健康检查 + Cases CRUD"
category: "backend-api"
source: "playbooks/guides/casework-evolution-loop.md — Scenario G Step 1"
description: "验证核心 GET/POST 端点的 status code + response shape"
safety_level: "safe"
priority: "critical"
tags: ["evolution-loop", "scenario-g", "smoke", "api"]

steps:
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/health"
    safety_check: "api.safe[GET /api/health]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases"
      auth: true
    safety_check: "api.safe[GET /api/cases]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/stats"
      auth: true
    safety_check: "api.safe[GET /api/cases/stats]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/todos"
      auth: true
    safety_check: "api.safe[GET /api/todos]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/issues"
      auth: true
    safety_check: "api.safe[GET /api/issues]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/settings"
      auth: true
    safety_check: "api.safe[GET /api/settings]"

assertions:
  - type: "status_code"
    target: "GET /api/health"
    expected: 200
  - type: "json_field"
    target: "GET /api/health"
    field: "status"
    expected: "ok"
  - type: "status_code"
    target: "GET /api/cases"
    expected: 200
  - type: "status_code"
    target: "GET /api/cases/stats"
    expected: 200
  - type: "status_code"
    target: "GET /api/todos"
    expected: 200
  - type: "status_code"
    target: "GET /api/issues"
    expected: 200

timeout_seconds: 30
