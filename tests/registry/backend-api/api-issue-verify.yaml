id: "api-issue-verify"
name: "Issue Verify Endpoints — POST /issues/:id/verify + verify-status + cancel-verify"
category: "backend-api"
source: "dashboard/src/routes/issues.ts — POST /issues/:id/verify, GET /issues/:id/verify-status, POST /issues/:id/cancel-verify"
description: "验证 issue verify 相关端点可达性：启动验证（已实现状态才可启动）、查询 verify-status、取消验证"
safety_level: "safe"
priority: "medium"
tags: ["api", "issues", "verify", "state-machine", "round-6"]

steps:
  # Step 1: Create a test issue
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues"
      body: '{"title":"TEST-AUTO: verify endpoint test","type":"feature","priority":"P3","description":"Automated test — will be deleted"}'
      auth: true
    safety_check: "api.safe[POST /api/issues]"
    expected_status: [200, 201]

  # Step 2: GET verify-status on a pending issue (should return 200 with status info)
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/issues/{created_issue_id}/verify-status"
      auth: true
      expected_status: [200, 404]
    safety_check: "api.safe[GET /api/issues]"

  # Step 3: POST verify on a pending issue (should return 400 — not implemented yet)
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues/{created_issue_id}/verify"
      auth: true
      expected_status: [200, 202, 400, 409, 422]
    safety_check: "api.safe[POST /api/issues]"

  # Step 4: POST cancel-verify (should return 200 or 404 if nothing to cancel)
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues/{created_issue_id}/cancel-verify"
      auth: true
      expected_status: [200, 404, 400]
    safety_check: "api.safe[POST /api/issues]"

  # Step 5: Set issue status to implemented
  - action: "http_request"
    params:
      method: "PUT"
      url: "{api_base}/api/issues/{created_issue_id}"
      body: '{"status":"implemented"}'
      auth: true
      expected_status: [200]
    safety_check: "api.safe[PUT /api/issues/:id]"

  # Step 6: POST verify on implemented issue (valid state for verify)
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues/{created_issue_id}/verify"
      auth: true
      expected_status: [200, 202, 400, 409, 422]
    safety_check: "api.safe[POST /api/issues]"

assertions:
  - type: "status_code"
    target: "POST /api/issues (create)"
    expected: [200, 201]
    description: "测试 issue 创建成功"

  - type: "status_code"
    target: "GET /api/issues/:id/verify-status"
    expected: [200, 404]
    description: "verify-status 端点可访问"

  - type: "status_code"
    target: "POST /api/issues/:id/verify (pending)"
    expected: [200, 202, 400, 409, 422]
    description: "verify 对 pending issue 返回有效状态码"

  - type: "status_code"
    target: "POST /api/issues/:id/cancel-verify"
    expected: [200, 404, 400]
    description: "cancel-verify 端点返回有效状态码"

  - type: "status_code"
    target: "PUT /api/issues/:id (set implemented)"
    expected: 200
    description: "PUT 更新 issue 为 implemented 成功"

  - type: "status_code"
    target: "POST /api/issues/:id/verify (implemented)"
    expected: [200, 202, 400, 409, 422]
    description: "verify 对 implemented issue 返回有效状态码"

teardown:
  - action: "http_request"
    params:
      method: "DELETE"
      url: "{api_base}/api/issues/{created_issue_id}"
      auth: true
    safety_check: "api.safe[DELETE /api/issues/:id]"

timeout_seconds: 30
