id: "auth-endpoints"
name: "认证端点测试"
category: "backend-api"
source: "dashboard/src/routes/auth.ts — SCAN gap"
description: "验证 auth 相关端点：status 检查、login 流程"
safety_level: "safe"
priority: "high"
tags: ["api", "auth", "auto-generated", "scan-round-0"]

steps:
  - action: "api_call"
    params:
      method: "GET"
      url: "{base_url}/api/auth/status"
    safety_check: "api.safe[GET]"
    expected_status: [200]

  - action: "api_call"
    params:
      method: "POST"
      url: "{base_url}/api/auth/login"
      body: '{"password": "{dashboard_password}"}'
    safety_check: "api.safe[POST /api/auth/login]"
    expected_status: [200]

  - action: "api_call"
    params:
      method: "GET"
      url: "{base_url}/api/auth/me"
      headers:
        Authorization: "Bearer {jwt_token}"
    safety_check: "api.safe[GET]"
    expected_status: [200]

assertions:
  - type: "response_field"
    target: "auth/status"
    field: "needSetup"
    expected: "is_boolean"
  - type: "response_field"
    target: "auth/login"
    field: "token"
    expected: "is_string"

timeout_seconds: 30
