id: "agents-routes"
name: "Agents API Routes — List + Cron Jobs + Patrol State"
category: "backend-api"
source: "dashboard/src/routes/agents.ts"
description: "验证 agents 相关 GET 端点返回 200 + 正确 JSON 结构"
safety_level: "safe"
priority: "medium"
tags: ["api", "agents", "round-1"]

steps:
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/agents"
      auth: true
    safety_check: "api.safe[GET /api/agents]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/agents/cron-jobs"
      auth: true
    safety_check: "api.safe[GET /api/agents]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/agents/patrol-state"
      auth: true
      expected_status: "200,404"
    safety_check: "api.safe[GET /api/agents]"

assertions:
  - type: "status_code"
    target: "GET /api/agents"
    expected: 200
  - type: "status_code"
    target: "GET /api/agents/cron-jobs"
    expected: 200
  - type: "status_code"
    target: "GET /api/agents/patrol-state"
    expected: [200, 404]  # 404 is valid when no patrol has been run

timeout_seconds: 30
