id: "test-supervisor-detail-endpoints"
name: "Test Supervisor Detail & Lookup Endpoints"
category: "backend-api"
source: "dashboard/src/routes/test-supervisor.ts"
description: "Verify GET /api/tests/result/:round/:testId, /fix/:testId, /manifest, /registry with valid and edge-case params"
safety_level: "safe"
priority: "high"
tags: ["testlab", "api", "plateau-breaking", "edge-case"]

steps:
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/tests/manifest"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/tests/registry"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/tests/result/0/core-endpoints"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/tests/fix/auth-endpoints"
      auth: true

assertions:
  - type: "status_code"
    target: "GET /api/tests/manifest"
    expected: 200
  - type: "status_code"
    target: "GET /api/tests/registry"
    expected: 200
  - type: "status_code"
    target: "GET /api/tests/result/0/core-endpoints"
    expected: 200
  - type: "status_code"
    target: "GET /api/tests/fix/auth-endpoints"
    expected: 200

timeout_seconds: 30
