id: "api-case-detail"
name: "Case Detail API — 单个 Case 的所有数据端点"
category: "backend-api"
source: "playbooks/guides/casework-evolution-loop.md — Scenario G Step 1"
description: "验证单个 Case 的 meta/emails/notes/todo/inspection/timing 端点"
safety_level: "safe"
priority: "high"
tags: ["evolution-loop", "scenario-g", "api"]

test_case_id: "2603090040000814"  # Data-rich

steps:
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}/meta"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}/emails"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}/notes"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}/todo"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}/inspection"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}/timing"
      auth: true

assertions:
  - type: "status_code"
    target: "GET /api/cases/{test_case_id}"
    expected: 200
  - type: "status_code"
    target: "GET /api/cases/{test_case_id}/meta"
    expected: 200
  - type: "json_field"
    target: "GET /api/cases/{test_case_id}/meta"
    field: "caseNumber"
    expected: "not_null"

timeout_seconds: 30
