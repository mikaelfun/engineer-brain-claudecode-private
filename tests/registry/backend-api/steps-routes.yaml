id: "steps-routes"
name: "Steps API Routes — Step List + Progress"
category: "backend-api"
source: "dashboard/src/routes/steps.ts"
description: "验证 step 相关 GET 端点返回 200（读操作），使用已有 case ID"
safety_level: "safe"
priority: "medium"
tags: ["api", "steps", "round-1"]
data_source: "live"
live_pool: "data_rich"

steps:
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/case/{case_id}/step"
      auth: true
    safety_check: "api.safe[GET /api/case/:id/step]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/case/{case_id}/step-progress"
      auth: true
    safety_check: "api.safe[GET /api/case/:id/step-progress]"

assertions:
  - type: "status_code"
    target: "GET /api/case/:id/step"
    expected: 200
  - type: "status_code"
    target: "GET /api/case/:id/step-progress"
    expected: 200

timeout_seconds: 30
