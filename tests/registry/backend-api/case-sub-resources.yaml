id: "case-sub-resources"
name: "Case Sub-Resource GET Endpoints — notes, teams, todo, timing, logs, inspection, drafts, analysis, attachments"
category: "backend-api"
source: "dashboard/src/routes/cases.ts"
description: "验证所有 case 子资源 GET 端点返回 200 + 有效 JSON"
safety_level: "safe"
priority: "medium"
tags: ["api", "cases", "sub-resources", "round-3"]
test_case_id: "2603090040000814"

steps:
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}/notes"
      auth: true
    safety_check: "api.safe[GET /api/cases/:id/notes]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}/teams"
      auth: true
    safety_check: "api.safe[GET /api/teams]"
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases/{test_case_id}/todo"
      auth: true
    safety_check: "api.safe[GET /api/cases/:id/todo]"
  - action: "http_request"
    params:
