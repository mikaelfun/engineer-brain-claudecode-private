id: "api-iss120-executor-adapt"
name: "ISS-120 — executor 适配 resolve_case_dir()"
category: "backend-api"
source: "issues/ISS-120.json"
description: "验证 ISS-120 AC：api-runner.sh、e2e-runner.sh、verify-rerun.sh 均适配 resolve_case_dir() 的 data_source 模式"
safety_level: "safe"
priority: "medium"
tags: ["issue-driven", "iss-120", "tracked"]

steps:
  - action: "bash_command"
    params:
      command: "grep -l 'resolve_case_dir' tests/executors/*.sh"
    description: "查找哪些 executor 使用了 resolve_case_dir"

assertions:
  - type: "bash_exit_zero"
    target: "grep -q 'resolve_case_dir' tests/executors/e2e-runner.sh"
    description: "e2e-runner.sh 已适配 resolve_case_dir()"
  - type: "bash_exit_zero"
    target: "grep -q 'resolve_case_dir\\|data_source' tests/executors/verify-rerun.sh"
    description: "verify-rerun.sh 已适配 data_source 模式"
  - type: "bash_exit_zero"
    target: "grep -q 'resolve_case_dir\\|data_source' tests/executors/api-runner.sh"
    description: "api-runner.sh 已适配 data_source 模式"

timeout_seconds: 30
