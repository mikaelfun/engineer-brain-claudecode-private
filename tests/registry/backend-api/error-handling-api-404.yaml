id: "error-handling-api-404"
name: "API Error Handling — 404 and Missing Resources"
category: "backend-api"
source: "dashboard/src/routes/test-supervisor.ts"
description: "Verify error handling for nonexistent resources: result/fix lookups with invalid IDs, missing auth token"
safety_level: "safe"
priority: "high"
tags: ["error-handling", "edge-case", "plateau-breaking"]

steps:
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/tests/result/999/nonexistent-test-id"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/tests/fix/nonexistent-test-id"
      auth: true
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/tests/state"
      auth: false

assertions:
  - type: "status_code"
    target: "GET /api/tests/result/999/nonexistent-test-id"
    expected: 404
  - type: "status_code"
    target: "GET /api/tests/fix/nonexistent-test-id"
    expected: 404
  - type: "status_code"
    target: "GET /api/tests/state (no auth)"
    expected: 401

timeout_seconds: 15
