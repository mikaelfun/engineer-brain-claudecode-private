id: "unit-web"
name: "Frontend Unit Tests — npm run test:web"
category: "unit-test"
description: "Run frontend-only Vitest unit tests (dashboard/web/src/**/*.test.{ts,tsx})"
safety_level: "safe"
priority: "high"
tags: ["unit", "vitest", "frontend"]

npm_command: "test:web"
npm_prefix:
expected_exit: "0"
timeout_seconds: 60

assertions:
  - type: "npm_exit_code"
    expected: "0"
  - type: "no_test_failures"
    expected: "0"
  - type: "tests_executed"
    expected: ">0"
