id: "arch-scanner-var-pipe"
name: "Architecture — Shell scripts avoid semicolon+var+pipe anti-pattern"
category: "workflow-e2e"
source: "arch-scan"
description: "Verify that shell scripts don't use 'VAR=val ; ... | pipe' pattern (variables silently dropped)"
safety_level: "safe"
priority: "P2"
tags: ["architecture", "shell", "anti-pattern", "cycle-41"]

steps:
  - action: "bash_command"
    params:
      command: "grep -rn '; .*=.* ; .*|' tests/executors/*.sh .claude/skills/ --include='*.sh' --include='*.md' 2>&1 | wc -l"
    safety_check: "scripts.safe[compliance-check]"

assertions:
  - type: "text_equals"
    target: "command_output"
    expected: "0"
    description: "No semicolon+var+pipe pattern in scripts or SKILL.md bash examples"

timeout_seconds: 30
