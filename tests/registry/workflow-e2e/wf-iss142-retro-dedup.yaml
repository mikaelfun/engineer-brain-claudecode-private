id: "wf-iss142-retro-dedup"
name: "ISS-142 AC4 — retro fix item 每轮每阶段最多 1 个（防刷屏）"
category: "workflow-e2e"
source: "issues/ISS-142.json"
description: "验证 ISS-142 AC4：每轮每阶段最多创建 1 个 retro fix item，防止 fixQueue 被刷屏"
safety_level: "safe"
priority: "medium"
tags: ["issue-driven", "iss-142", "phase-retrospective", "implemented"]

steps:
  - action: "bash_command"
    params:
      command: "node -e \"const s=JSON.parse(require('fs').readFileSync('tests/state.json','utf8')); const retros=(s.fixQueue||[]).filter(i=>i.testId&&i.testId.startsWith('retro-fix-')); console.log('retro items:', retros.length, retros.map(i=>i.testId));\""
    description: "检查 fixQueue 中 retro-fix 项目数量"

assertions:
  - type: "bash_exit_zero"
    target: "grep -q 'retro fix item\\|防刷屏\\|最多创建 1 个\\|every phase' .claude/skills/test-loop/SKILL.md"
    description: "SKILL.md 明确说明每轮每阶段最多 1 个 retro fix"

  - type: "bash_exit_zero"
    target: "node -e \"const s=JSON.parse(require('fs').readFileSync('tests/state.json','utf8')); const r=(s.fixQueue||[]).filter(i=>i.testId&&i.testId.startsWith('retro-fix-')); process.exit(r.length <= 5 ? 0 : 1);\""
    description: "fixQueue 中 retro fix item 数量合理（<=5）"

timeout_seconds: 30
