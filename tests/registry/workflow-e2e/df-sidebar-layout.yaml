id: "df-sidebar-layout"
name: "Design Fidelity: 布局为左侧固定侧边栏 220px"
category: "workflow-e2e"
source: "design-fidelity"
description: "验证 Layout.tsx 实现左侧固定 220px 侧边栏布局，替代旧版顶部导航"
safety_level: "safe"
priority: "high"
recipe_used: "design-fidelity-test.md"
tags: ["design-fidelity", "design-system-integration", "layout", "sidebar"]

steps:
  - action: "bash_command"
    params:
      command: "grep -c \"220px\\|sidebar-width\" dashboard/web/src/components/Layout.tsx"
    safety_check: "scripts.safe[compliance-check]"
  - action: "bash_command"
    params:
      command: "grep -c \"\\bfixed\\b\" dashboard/web/src/components/Layout.tsx"
    safety_check: "scripts.safe[compliance-check]"
  - action: "bash_command"
    params:
      command: "grep -cn \"marginLeft.*220\\|var(--sidebar-width\" dashboard/web/src/components/Layout.tsx"
    safety_check: "scripts.safe[compliance-check]"

assertions:
  - type: "text_gt"
    target: "step1_output"
    expected: "0"
    description: "Layout.tsx must reference 220px or --sidebar-width CSS variable"
  - type: "text_gt"
    target: "step2_output"
    expected: "0"
    description: "Sidebar must have fixed positioning (Tailwind 'fixed' or CSS position:fixed)"
  - type: "text_gt"
    target: "step3_output"
    expected: "0"
    description: "Main content must offset by sidebar width"

timeout_seconds: 30
