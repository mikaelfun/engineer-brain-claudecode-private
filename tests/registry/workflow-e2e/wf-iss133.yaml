id: "wf-iss133"
name: "ISS-133 — 新增 issue-scanner.sh 扫描 issues/ 目录生成测试"
category: "workflow-e2e"
source: "issues/ISS-133.json"
description: "验证 ISS-133（implemented）的验收标准：issue-scanner.sh 扫描 tracked/implemented issue 并提取 AC gap"
safety_level: "safe"
data_source: live
live_pool: "data_rich"
priority: "high"
tags: ["issue-driven", "iss-133", "implemented"]

steps:
  - action: "run_skill"
    params:
      skill: "data-refresh"
      case_id: "{live_case_id}"
    safety_check: "scripts.safe[data-refresh]"

assertions:
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "issue-scanner.sh 扫描 tracked/implemented issue 并提取 AC gap"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "输出格式与 spec-scanner.sh 一致: ISSUE_GAP"

timeout_seconds: 120
