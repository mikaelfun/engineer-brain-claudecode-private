id: "syn-compliance-fail"
name: "Synthetic — Compliance Fail (No China in Service Name)"
category: "workflow-e2e"
source: "issues/ISS-177.json"
description: "Generate compliance-fail-no-china synthetic case → verify case-info.md entitlement lacks China → verify casehealth-meta.json compliance.entitlementOk=false with warnings"
safety_level: "safe"
priority: "medium"
tags: ["synthetic", "compliance", "iss-177"]

data_source: synthetic
synthetic_profile: compliance-fail-no-china

steps:
  - action: "run_script"
    params:
      command: "echo 'Synthetic case generated at {case_dir}'"

assertions:
  - type: "file_exists"
    target: "{case_dir}/case-info.md"
    expected: true
    description: "case-info.md generated"
  - type: "file_content"
    target: "{case_dir}/case-info.md"
    expected: "US West"
    description: "Service Name contains US West (non-China)"
  - type: "file_content"
    target: "{case_dir}/casehealth-meta.json"
    expected: "valid_json"
    description: "casehealth-meta.json is valid JSON"
  - type: "json_field"
    target: "{case_dir}/casehealth-meta.json"
    field: "compliance.entitlementOk"
    expected: false
    description: "Entitlement check fails"

timeout_seconds: 30
