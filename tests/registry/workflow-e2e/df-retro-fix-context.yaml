id: "df-retro-fix-context"
name: "Design Fidelity: FIX stage recognizes retroContext for guided repair"
category: "workflow-e2e"
source: "design-fidelity"
description: "Verifies phase-retro AC7: FIX 阶段能识别 retroContext 并利用其中的定位信息修复框架代码"
safety_level: "safe"
priority: "high"
tags: ["design-fidelity", "phase-retro", "fix-stage"]
recipe_used: "design-fidelity-test.md"

steps:
  - action: "bash_command"
    params:
      command: |
        # Check that FIX phase references retroContext
        grep -c "retroContext\|retro_context\|retro context" .claude/skills/stage-worker/phases/FIX.md 2>/dev/null || echo "0"
    description: "Check FIX phase mentions retroContext"

assertions:
  - type: "bash_exit_zero"
    target: "grep -q 'retroContext\\|retro_context' .claude/skills/stage-worker/phases/FIX.md 2>/dev/null"
    description: "FIX.md contains retroContext reference"

  - type: "bash_exit_zero"
    target: "grep -q 'retroContext\\|retro_context\\|retro' tests/executors/fix-analyzer.sh 2>/dev/null"
    description: "fix-analyzer.sh handles retroContext"

timeout_seconds: 15
