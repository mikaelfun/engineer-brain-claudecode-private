id: "syn-edge-corrupted-meta"
name: "Synthetic — Edge: Corrupted Meta (invalid JSON)"
category: "workflow-e2e"
source: "issues/ISS-177.json"
description: "Generate edge-corrupted-meta synthetic case → verify casehealth-meta.json is NOT valid JSON (intentionally corrupted)"
safety_level: "safe"
priority: "medium"
tags: ["synthetic", "edge-case", "iss-177"]

data_source: synthetic
synthetic_profile: edge-corrupted-meta

steps:
  - action: "run_script"
    params:
      command: "echo 'Synthetic case generated at {case_dir}'"

assertions:
  - type: "file_exists"
    target: "{case_dir}/case-info.md"
    expected: true
    description: "case-info.md still generated even with corrupt meta"
  - type: "file_exists"
    target: "{case_dir}/casehealth-meta.json"
    expected: true
    description: "casehealth-meta.json file exists"
  - type: "file_content"
    target: "{case_dir}/casehealth-meta.json"
    expected: "non_empty"
    description: "casehealth-meta.json has content (corrupt content)"

timeout_seconds: 30
