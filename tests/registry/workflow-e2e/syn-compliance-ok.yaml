id: "syn-compliance-ok"
name: "Synthetic — Compliance OK (China Cld profile)"
category: "workflow-e2e"
source: "issues/ISS-177.json"
description: "Generate compliance-ok-china-cld synthetic case → verify case-info.md has China Cld entitlement → verify casehealth-meta.json compliance.entitlementOk=true"
safety_level: "safe"
priority: "medium"
tags: ["synthetic", "compliance", "iss-177"]

data_source: synthetic
synthetic_profile: compliance-ok-china-cld

steps:
  - action: "run_script"
    params:
      command: "echo 'Synthetic case generated at {case_dir}'"

assertions:
  - type: "file_exists"
    target: "{case_dir}/case-info.md"
    expected: true
    description: "case-info.md generated"
  - type: "file_content"
    target: "{case_dir}/case-info.md"
    expected: "China Cld"
    description: "Service Name contains China Cld"
  - type: "file_content"
    target: "{case_dir}/casehealth-meta.json"
    expected: "valid_json"
    description: "casehealth-meta.json is valid JSON"
  - type: "json_field"
    target: "{case_dir}/casehealth-meta.json"
    field: "compliance.entitlementOk"
    expected: true
    description: "Entitlement check passes"
  - type: "json_field"
    target: "{case_dir}/casehealth-meta.json"
    field: "compliance.is21vConvert"
    expected: false
    description: "Not a 21v convert case"

timeout_seconds: 30
