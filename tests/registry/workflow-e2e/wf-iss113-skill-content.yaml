id: "wf-iss113-skill-content"
name: "ISS-113 — SKILL.md 内容更新验证（inspection-writer / casework / case-directory）"
category: "workflow-e2e"
source: "issues/ISS-113.json"
description: "验证 ISS-113 AC：inspection-writer/SKILL.md 重写为新逻辑、casework/SKILL.md Step 4 更新为新流程、case-directory.md 更新文件角色说明"
safety_level: "safe"
priority: "medium"
tags: ["issue-driven", "iss-113", "skill-content", "doc-check"]

steps:
  - action: "bash_command"
    params:
      command: "cat .claude/skills/inspection-writer/SKILL.md | grep -c 'case-summary'"
    description: "检查 inspection-writer/SKILL.md 包含 case-summary 新逻辑关键词"

  - action: "bash_command"
    params:
      command: "cat .claude/skills/casework/SKILL.md | grep -c 'inspection'"
    description: "检查 casework/SKILL.md 包含 inspection 流程描述"

  - action: "bash_command"
    params:
      command: "cat playbooks/schemas/case-directory.md | grep -c 'context'"
    description: "检查 case-directory.md 包含 context 目录角色说明"

assertions:
  - type: "file_exists"
    target: ".claude/skills/inspection-writer/SKILL.md"
    description: "inspection-writer/SKILL.md 重写为新逻辑"

  - type: "file_exists"
    target: ".claude/skills/casework/SKILL.md"
    description: "casework/SKILL.md Step 4 更新为新流程"

  - type: "file_exists"
    target: "playbooks/schemas/case-directory.md"
    description: "case-directory.md 更新文件角色说明"

timeout_seconds: 30
