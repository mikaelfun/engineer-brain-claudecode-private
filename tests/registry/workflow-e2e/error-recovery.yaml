id: "e2e-error-recovery"
name: "Error Recovery — 故障注入"
category: "workflow-e2e"
source: "playbooks/guides/casework-evolution-loop.md — Scenario E"
description: "故意制造异常（损坏 JSON、删除目录）→ 跑 casework → 验证不崩溃、能恢复"
safety_level: "safe"
priority: "medium"
tags: ["evolution-loop", "scenario-e", "regression", "robustness"]

test_case_id: "2603250010001221"  # Data-sparse, 适合错误恢复测试

setup:
  - action: "backup_case"
    params:
      source: "{cases_root}/active/{test_case_id}"
      dest: "{backup_dir}/{test_case_id}"

steps:
  # 场景 1: 损坏 JSON 文件
  - action: "corrupt_file"
    params:
      file: "{cases_root}/active/{test_case_id}/casehealth-meta.json"
      content: "{invalid json}}}"
  - action: "run_casework"
    params:
      case_id: "{test_case_id}"
    safety_check: "scripts.safe[casework]"
    timeout_seconds: 300

  # 场景 2: 删除 logs 目录
  - action: "delete_dir"
    params:
      target: "{cases_root}/active/{test_case_id}/logs/"
  - action: "run_casework"
    params:
      case_id: "{test_case_id}"
    safety_check: "scripts.safe[casework]"
    timeout_seconds: 300

assertions:
  - type: "file_exists"
    target: "{cases_root}/active/{test_case_id}/case-summary.md"
    expected: true
  - type: "file_content"
    target: "{cases_root}/active/{test_case_id}/casehealth-meta.json"
    expected: "valid_json"  # 应该被修复

teardown:
  - action: "restore_case"
    params:
      source: "{backup_dir}/{test_case_id}"
      dest: "{cases_root}/active/{test_case_id}"

timeout_seconds: 600
