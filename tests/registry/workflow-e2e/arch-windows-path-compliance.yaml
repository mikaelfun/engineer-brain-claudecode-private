id: "arch-windows-path-compliance"
name: "Architecture: No Windows-style paths in SKILL.md files"
category: "workflow-e2e"
source: "arch-scan:windows-path"
safety_level: "safe"
description: "Verify that SKILL.md files under .claude/skills/ do not contain Windows-style absolute paths (C:\\ backslashes) that would fail in Git Bash POSIX environment"

steps:
  - action: "validate"
    params:
      description: "Scan .claude/skills/*/SKILL.md files for Windows-style paths"

assertions:
  - type: "bash_output_not_contains"
    target: "grep -r 'C:\\\\' .claude/skills/ --include='SKILL.md' -l 2>/dev/null || echo ''"
    expected: ".md"
    description: "No SKILL.md files should contain C:\\ Windows paths"
  - type: "bash_output_not_contains"
    target: "grep -rP 'C:\\\\\\\\[A-Za-z]' .claude/skills/ --include='SKILL.md' -l 2>/dev/null || echo ''"
    expected: ".md"
    description: "No SKILL.md files should contain backslash paths"

