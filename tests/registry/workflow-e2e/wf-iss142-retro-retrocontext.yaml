id: "wf-iss142-retro-retrocontext"
name: "ISS-142 AC3 — Phase Retrospective 三步骤触发后文件存在"
category: "workflow-e2e"
source: "issues/ISS-142.json"
description: "验证 ISS-142 AC3：发现逻辑 bug 时自动执行三步：learnings-writer + fixQueue framework item(priority=1, retroContext) + self-heal-recorder"
safety_level: "safe"
priority: "high"
tags: ["issue-driven", "iss-142", "phase-retrospective", "implemented"]

steps:
  - action: "bash_command"
    params:
      command: "ls tests/results/fixes/*-self-heal.md 2>/dev/null | head -3"
    description: "列出已记录的自愈文件"

  - action: "bash_command"
    params:
      command: "grep -l 'logic_bug\\|systemic\\|stuck' tests/results/fixes/*-self-heal.md 2>/dev/null | wc -l"
    description: "统计含自愈动作的文件数量"

assertions:
  - type: "file_exists"
    target: "tests/executors/self-heal-recorder.sh"
    description: "self-heal-recorder.sh 存在且可调用"

  - type: "bash_exit_zero"
    target: "test -x tests/executors/self-heal-recorder.sh"
    description: "self-heal-recorder.sh 有执行权限"

  - type: "bash_exit_zero"
    target: "grep -q 'SELF_HEAL_RECORDED' tests/executors/self-heal-recorder.sh"
    description: "self-heal-recorder.sh 输出 SELF_HEAL_RECORDED 标准格式"

  - type: "bash_exit_zero"
    target: "grep -q 'retroContext\\|retro' .claude/skills/test-loop/SKILL.md"
    description: "SKILL.md 包含 retroContext 相关内容（三步骤）"

timeout_seconds: 30
