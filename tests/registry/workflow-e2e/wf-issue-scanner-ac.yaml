id: "wf-issue-scanner-ac"
name: "Issue Scanner — AC Gap 扫描验证"
category: "workflow-e2e"
source: "ISS-133 / conductor/tracks/issue-scanner_20260329/spec.md"
description: "验证 issue-scanner.sh 正确扫描 tracked/implemented issues，提取 AC gap，输出标准格式 ISSUE_GAP|issueId|criterion|category"
safety_level: "safe"
priority: "high"
tags: ["issue-scanner", "scan", "framework"]

source_type: "issue-driven"
issueId: "ISS-133"
trackId: "issue-scanner_20260329"

steps:
  - action: "run_bash"
    params:
      command: "bash tests/executors/issue-scanner.sh"
      cwd: "{project_root}"
    safety_check: "scripts.safe[read-only]"
    timeout_seconds: 60

assertions:
  # AC1: 扫描 implemented issue 并提取 AC gap
  - type: "stdout_contains"
    expected: "ISSUE_GAP"
    description: "Output must contain at least one ISSUE_GAP line"

  # AC2: pending issue 被跳过
  - type: "stdout_pattern"
    expected: "ISSUE_SKIP\\|.*pending"
    description: "Pending issues must be reported as ISSUE_SKIP"

  # AC3: done issue 检查回归覆盖
  - type: "stdout_pattern"
    expected: "ISSUE_REGRESSION_GAP|ISSUE_COVERED"
    description: "Done issues must produce ISSUE_REGRESSION_GAP or ISSUE_COVERED"

  # AC5: 输出格式与 spec-scanner 一致
  - type: "stdout_pattern"
    expected: "ISSUE_GAP\\|ISS-[0-9]+\\|.+\\|.+"
    description: "ISSUE_GAP format must be: ISSUE_GAP|issueId|criterion|category"

  # Script exits 0
  - type: "exit_code"
    expected: 0

timeout_seconds: 120
