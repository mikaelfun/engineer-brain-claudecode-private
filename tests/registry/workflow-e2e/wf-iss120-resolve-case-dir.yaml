id: "wf-iss120-resolve-case-dir"
name: "ISS-120 — common.sh resolve_case_dir() 函数"
category: "workflow-e2e"
source: "issues/ISS-120.json"
description: "验证 ISS-120 AC：common.sh 新增 resolve_case_dir() 函数，根据 test definition 的 data_source 返回对应 case 目录路径"
safety_level: "safe"
priority: "medium"
tags: ["issue-driven", "iss-120", "tracked"]

steps:
  - action: "bash_command"
    params:
      command: "grep -n 'resolve_case_dir' tests/executors/common.sh"
    description: "验证 resolve_case_dir 函数存在于 common.sh"
  - action: "bash_command"
    params:
      command: "source tests/executors/common.sh && type resolve_case_dir"
    description: "验证 resolve_case_dir 可调用"

assertions:
  - type: "bash_exit_zero"
    target: "grep -q 'resolve_case_dir' tests/executors/common.sh"
    description: "common.sh 中存在 resolve_case_dir 函数定义"
  - type: "bash_exit_zero"
    target: "grep -c 'resolve_case_dir' tests/executors/common.sh | awk '$1>=2'"
    description: "resolve_case_dir 至少有函数定义和调用注释"

timeout_seconds: 30
