id: "wf-iss137"
name: "ISS-137 — env.yaml 增加 autoImplementTracked 开关控制自动实现"
category: "workflow-e2e"
source: "issues/ISS-137.json"
description: "验证 ISS-137（tracked）的验收标准：env.yaml 包含 autoImplementTracked 配置项（默认 false）"
safety_level: "safe"
data_source: live
live_pool: "data_rich"
priority: "medium"
tags: ["issue-driven", "iss-137", "tracked"]

steps:
  - action: "run_skill"
    params:
      skill: "data-refresh"
      case_id: "{live_case_id}"
    safety_check: "scripts.safe[data-refresh]"

assertions:
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "env.yaml 包含 autoImplementTracked 配置项（默认 false）"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "autoImplementTracked=true 时自动 spawn conductor:implement"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "实现完成后 issue 状态正确更新"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "SKILL.md 文档清晰描述此功能"

timeout_seconds: 120
