id: "reg-guard-live-pool-resolution"
name: "Regression Guard — live pool resolution returns valid case dir"
category: "workflow-e2e"
source: "wf-regression-scan"
description: "Guards against the systemic wf regression (15/24 tests): verify resolve_case_dir returns non-empty valid path for data_source=live tests. Prevents casework requires case ID failures."
safety_level: "safe"
priority: "critical"
tags: ["regression-guard", "infrastructure", "wf-regression-77pct"]
recipe_used: "none"

steps:
  - action: "bash_command"
    params:
      command: |
        source tests/executors/common.sh
        # Test resolve_case_dir with a live data_source test def
        LIVE_TEST=$(ls tests/registry/workflow-e2e/wf-iss049.yaml 2>/dev/null | head -1)
        if [ -z "$LIVE_TEST" ]; then echo "FAIL: no live test def found"; exit 1; fi
        RESULT=$(resolve_case_dir "$LIVE_TEST" 2>/dev/null)
        if [ -z "$RESULT" ]; then
          echo "FAIL: resolve_case_dir returned empty for $LIVE_TEST"
          exit 1
        fi
        echo "PASS: resolved to $RESULT"
    description: "Verify resolve_case_dir returns non-empty for live data_source"

  - action: "bash_command"
    params:
      command: |
        source tests/executors/common.sh
        # Test select_live_case for data_rich pool
        RESULT=$(select_live_case "data_rich" 2>/dev/null)
        if [ -z "$RESULT" ]; then
          echo "FAIL: select_live_case data_rich returned empty"
          exit 1
        fi
        if [ ! -d "$RESULT" ]; then
          echo "WARN: directory $RESULT does not exist (may be expected if case archived)"
        fi
        echo "PASS: data_rich → $RESULT"
    description: "Verify select_live_case returns non-empty for data_rich pool"

assertions:
  - type: "bash_exit_zero"
    target: "source tests/executors/common.sh && RESULT=$(select_live_case 'data_rich' 2>/dev/null) && [ -n \"$RESULT\" ]"
    description: "select_live_case data_rich returns non-empty"

  - type: "bash_exit_zero"
    target: "test -f tests/fixtures/live-cases.yaml"
    description: "live-cases.yaml exists"

  - type: "bash_exit_zero"
    target: "grep -q 'data_rich' tests/fixtures/live-cases.yaml 2>/dev/null || grep -q 'data_rich' tests/env.yaml"
    description: "data_rich pool is defined in live-cases.yaml or env.yaml"

timeout_seconds: 30
