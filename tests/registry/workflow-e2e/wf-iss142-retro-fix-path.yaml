id: "wf-iss142-retro-fix-path"
name: "ISS-142 AC2+fix — FIX 阶段识别 retroContext 并精准修复"
category: "workflow-e2e"
source: "issues/ISS-142.json"
description: "验证 ISS-142 AC2+FIX：Retrospective 输出结构化判断（retroContext），FIX 阶段 framework fix 路径识别并利用 retroContext 中的 targetFile/targetLine 精准修复"
safety_level: "safe"
priority: "medium"
tags: ["issue-driven", "iss-142", "phase-retrospective", "implemented"]

steps:
  - action: "bash_command"
    params:
      command: "grep -n 'retroContext' .claude/skills/test-loop/SKILL.md | wc -l"
    description: "SKILL.md 包含 retroContext 定义"

assertions:
  - type: "bash_exit_zero"
    target: "grep -q 'retroContext' .claude/skills/test-loop/SKILL.md"
    description: "SKILL.md FIX 阶段包含 retroContext 识别逻辑"

  - type: "bash_exit_zero"
    target: "grep -q 'targetFile\\|targetLine' .claude/skills/test-loop/SKILL.md"
    description: "SKILL.md 包含 targetFile/targetLine 字段定义"

  - type: "bash_exit_zero"
    target: "grep -A 5 'retroContext' .claude/skills/test-loop/SKILL.md | grep -q 'targetFile\\|直接定位\\|精准修复'"
    description: "retroContext 用于精准定位修复目标"

timeout_seconds: 30
