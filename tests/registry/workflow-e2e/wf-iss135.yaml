id: "wf-iss135"
name: "ISS-135 — fix-analyzer.sh 增加根因追溯，减少误判 env issue"
category: "workflow-e2e"
source: "issues/ISS-135.json"
description: "验证 ISS-135（tracked）的验收标准：timeout/auth_issue/service_down 不再直接标记为 env issue"
safety_level: "safe"
data_source: live
live_pool: "data_rich"
priority: "medium"
tags: ["issue-driven", "iss-135", "tracked"]

steps:
  - action: "run_skill"
    params:
      skill: "data-refresh"
      case_id: "{live_case_id}"
    safety_check: "scripts.safe[data-refresh]"

assertions:
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "timeout/auth_issue/service_down 不再直接标记为 env issue"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "配置缺失问题正确归类为 config_missing (code_bug)"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "真正的临时环境问题仍标记为 env issue"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "analysis.md 输出包含 trace 路径"

timeout_seconds: 120
