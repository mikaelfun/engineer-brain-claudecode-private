id: "e2e-patrol-basic"
name: "Patrol 批量巡检 — 启动 + 状态查询"
category: "workflow-e2e"
source: ".claude/skills/patrol/SKILL.md — AC12"
description: "验证 POST /api/patrol 返回 202，GET /api/patrol/status 可查询"
safety_level: "safe"
priority: "medium"
tags: ["patrol", "e2e", "batch"]

steps:
  - action: "run_patrol"
    params:
      endpoint: "{api_base}/api/patrol"
    safety_check: "api.safe[POST /api/patrol]"

  - action: "check_patrol_status"
    params:
      endpoint: "{api_base}/api/patrol/status"
    safety_check: "api.safe[GET /api/patrol/status]"

assertions:
  - type: "status_code"
    target: "POST /api/patrol"
    expected: 202
  - type: "status_code"
    target: "GET /api/patrol/status"
    expected: 200
  - type: "json_field"
    target: "GET /api/patrol/status"
    field: "status"
    expected: "running|idle|completed"

timeout_seconds: 60
