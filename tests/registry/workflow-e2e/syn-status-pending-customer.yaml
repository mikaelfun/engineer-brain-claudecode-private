id: "syn-status-pending-customer"
name: "Synthetic — Status: Pending Customer"
category: "workflow-e2e"
source: "issues/ISS-177.json"
description: "Generate status-pending-customer synthetic case → verify casehealth-meta.json actualStatus=pending-customer and daysSinceLastContact=3"
safety_level: "safe"
priority: "medium"
tags: ["synthetic", "status-judge", "iss-177"]

data_source: synthetic
synthetic_profile: status-pending-customer

steps:
  - action: "run_script"
    params:
      command: "echo 'Synthetic case generated at {case_dir}'"

assertions:
  - type: "file_exists"
    target: "{case_dir}/case-info.md"
    expected: true
    description: "case-info.md generated"
  - type: "file_content"
    target: "{case_dir}/casehealth-meta.json"
    expected: "valid_json"
    description: "casehealth-meta.json is valid JSON"
  - type: "json_field"
    target: "{case_dir}/casehealth-meta.json"
    field: "actualStatus"
    expected: "pending-customer"
    description: "Status is pending-customer"
  - type: "json_field"
    target: "{case_dir}/casehealth-meta.json"
    field: "daysSinceLastContact"
    expected: "not_null"
    description: "daysSinceLastContact is set"

timeout_seconds: 30
