id: "integ-select-live-case-pools"
name: "Integration — select_live_case covers all pool types"
category: "workflow-e2e"
source: "wf-regression-scan"
description: "Integration test: select_live_case returns non-empty for each pool type (data_rich/data_sparse/minimal). Prevents systemic wf test failures from pool resolution."
safety_level: "safe"
priority: "critical"
tags: ["regression-guard", "integration", "infrastructure"]
recipe_used: "none"

steps:
  - action: "bash_command"
    params:
      command: |
        source tests/executors/common.sh
        ERRORS=0
        for pool in data_rich data_sparse minimal; do
          RESULT=$(select_live_case "$pool" 2>/dev/null)
          if [ -z "$RESULT" ]; then
            echo "FAIL: pool=$pool returned empty"
            ERRORS=$((ERRORS+1))
          else
            echo "PASS: pool=$pool → $RESULT"
          fi
        done
        exit $ERRORS
    description: "Test all pool types return non-empty"

assertions:
  - type: "bash_exit_zero"
    target: "source tests/executors/common.sh && [ -n \"$(select_live_case 'data_rich' 2>/dev/null)\" ]"
    description: "data_rich pool returns non-empty"

  - type: "bash_exit_zero"
    target: "source tests/executors/common.sh && [ -n \"$(select_live_case 'data_sparse' 2>/dev/null)\" ]"
    description: "data_sparse pool returns non-empty"

  - type: "bash_exit_zero"
    target: "source tests/executors/common.sh && [ -n \"$(select_live_case 'minimal' 2>/dev/null)\" ]"
    description: "minimal pool returns non-empty"

timeout_seconds: 30
