id: "regression-iss030"
name: "Regression: ISS-030 — 点击verify后测试第二步报错"
category: "ui-interaction"
source: "issues/ISS-030.json"
description: "回归测试：验证 ISS-030 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-030"]
regression_for: "ISS-030"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "排查 `browser-test.mjs` 失败的实际原因（读取错误输出 / 截图）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "修复 `browser-test.mjs` 中的问题（端口、登录、页面错误等）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Verify 接口在执行第二步前检测服务是否可用，不可用时返回明确错误信息而非超时"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Verify 两步测试都能正常通过"

timeout_seconds: 60
