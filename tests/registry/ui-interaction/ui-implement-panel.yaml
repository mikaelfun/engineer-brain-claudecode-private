id: "ui-implement-panel"
name: "UI Interaction: Implement/Track Panel — 实现进度面板"
category: "ui-interaction"
source: "dashboard/web/src/components/ImplementPanel.tsx, TrackProgressPanel.tsx"
description: "验证 Issues 页面的实现进度面板：导航至 Issues 列表，检查 ImplementPanel/TrackProgressPanel 组件可访问"
safety_level: "safe"
priority: "medium"
tags: ["ui", "interaction", "implement-panel", "track-progress", "round-8"]

steps:
  # Step 1: 导航至 Dashboard
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"

  # Step 2: 导航至 Issues 列表
  - action: "click"
    params:
      target: "Issues nav item"
    safety_check: "ui.safe[click_sidebar_nav]"

  # Step 3: 验证 Issues 列表
  - action: "verify_element"
    params:
      selector: "table tbody, [class*='issue-list'], [data-testid='issue-list'], main"
      expected: "visible"
      timeout: 5000

  # Step 4: 截图 Issues 页
  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-implement-panel-issues.jpg"

  # Step 5: 尝试点击第一个 Issue（如有）
  - action: "check_element"
    params:
      selector: "table tbody tr:first-child, [class*='issue-row']:first-child"
      timeout: 3000
      optional: true

  # Step 6: 寻找 ImplementPanel 或 TrackProgressPanel 入口
  - action: "check_element"
    params:
      selector: "[data-testid='implement-panel'], [class*='implement-panel'], [class*='ImplementPanel'], [class*='TrackProgress'], [class*='track-progress']"
      timeout: 3000
      optional: true

  # Step 7: 截图
  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-implement-panel-detail.jpg"

assertions:
  - type: "element_visible"
    target: "issues page main content"
    expected: true
    description: "Issues 页面主内容区域可见"

  - type: "page_load"
    target: "/issues"
    expected: "loaded"
    description: "Issues 页面加载成功"

  - type: "no_console_errors"
    target: "page"
    description: "页面无严重控制台错误"

timeout_seconds: 45
