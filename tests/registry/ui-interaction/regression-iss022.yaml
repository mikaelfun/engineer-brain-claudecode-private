id: "regression-iss022"
name: "Regression: ISS-022 — Case Detail 页面 Inspection Tab 默认首位展示 + 格式美化"
category: "ui-interaction"
source: "issues/ISS-022.json"
description: "回归测试：验证 ISS-022 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-022"]
regression_for: "ISS-022"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Markdown 表格有清晰的边框和交替行色"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "标题层级有明显的视觉区分（字号、粗细）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "列表（有序/无序）有正确的缩进和标记"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "行内代码和代码块有背景色区分"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "引用块（blockquote）有左边框和背景色"

timeout_seconds: 60
