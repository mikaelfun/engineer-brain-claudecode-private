id: "regression-iss057"
name: "Regression: ISS-057 — Agent Monitor Case Session 列表行增加 Stop 按钮 + 一键释放所有 Session"
category: "ui-interaction"
source: "issues/ISS-057.json"
description: "回归测试：验证 ISS-057 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-057"]
regression_for: "ISS-057"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "停止后 session 状态自动刷新"

timeout_seconds: 60
