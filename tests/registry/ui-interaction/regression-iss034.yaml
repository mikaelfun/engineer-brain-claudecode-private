id: "regression-iss034"
name: "Regression: ISS-034 — WebUI Issues 页面 tracked issue 应显示 track 的问题原因和修复计划"
category: "ui-interaction"
source: "issues/ISS-034.json"
description: "回归测试：验证 ISS-034 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-034"]
regression_for: "ISS-034"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "后端提供 `GET /api/issues/:id/track-spec` 端点，返回 spec.md 原始内容"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Track 数据懒加载：仅在展开时 fetch，收起时不请求"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "使用 CSS 变量适配双主题"

timeout_seconds: 60
