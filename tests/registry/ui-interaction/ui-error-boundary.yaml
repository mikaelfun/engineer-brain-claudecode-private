id: "ui-error-boundary"
name: "UI Interaction: Error Boundary — 错误边界组件"
category: "ui-interaction"
source: "dashboard/web/src/components/common/ErrorBoundary.tsx"
description: "验证 ErrorBoundary 组件：页面在正常状态下无错误边界触发，Dashboard 各主要页面正常渲染无崩溃"
safety_level: "safe"
priority: "low"
tags: ["ui", "interaction", "error-boundary", "resilience", "round-10"]

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"

  - action: "verify_element"
    params:
      selector: "main"
      expected: "visible"
      timeout: 5000

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-error-boundary-dashboard.jpg"

  - action: "navigate"
    params:
      url: "{frontend_url}/cases"
    safety_check: "ui.safe[navigate_to_page]"

  - action: "verify_element"
    params:
      selector: "main"
      expected: "visible"
      timeout: 5000

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-error-boundary-cases.jpg"

  - action: "navigate"
    params:
      url: "{frontend_url}/issues"
    safety_check: "ui.safe[navigate_to_page]"

  - action: "verify_element"
    params:
      selector: "main"
      expected: "visible"
      timeout: 5000

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-error-boundary-issues.jpg"

assertions:
  - type: "element_not_present"
    selector: ".error-boundary-fallback"
    description: "无错误边界 fallback UI 出现"
  - type: "element_not_present"
    selector: "[data-testid='error-boundary']"
    description: "无 data-testid=error-boundary 的错误提示"
  - type: "no_console_errors"
    description: "控制台无未捕获错误"
