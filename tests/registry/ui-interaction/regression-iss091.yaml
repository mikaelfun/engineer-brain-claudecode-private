id: "regression-iss091"
name: "Regression: ISS-091 — SSE 中出现两遍相同的消息流，agent monitor 正确只有一遍"
category: "ui-interaction"
source: "issues/ISS-091.json"
description: "回归测试：验证 ISS-091 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-091"]
regression_for: "ISS-091"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Store-level de-duplication prevents identical messages from appearing twice"

timeout_seconds: 60
