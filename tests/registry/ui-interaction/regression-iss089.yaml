id: "regression-iss089"
name: "Regression: ISS-089 — WebUI restart 按钮产生残留进程 — killPid 不杀进程树 + spawnBackend 无 kill"
category: "ui-interaction"
source: "issues/ISS-089.json"
description: "回归测试：验证 ISS-089 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-089"]
regression_for: "ISS-089"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "`killPid()` 使用 `taskkill /F /T /PID` 杀进程树"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "spawn 的子进程 PID 被记录，restart 时先杀旧进程树"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "连续执行 3 次 restart 后，无孤儿 cmd/node/bash 进程产生"

timeout_seconds: 60
