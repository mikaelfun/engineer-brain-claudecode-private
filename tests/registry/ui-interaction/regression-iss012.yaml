id: "regression-iss012"
name: "Regression: ISS-012 — Issue 页面添加重启前后端按钮"
category: "ui-interaction"
source: "issues/ISS-012.json"
description: "回归测试：验证 ISS-012 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-012"]
regression_for: "ISS-012"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Issues 页面有三个按钮：重启前端、重启后端、重启全部"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "点击后端重启按钮，后端进程重启，API 恢复可用"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "点击前端重启按钮，前端 vite 进程重启，页面自动重连"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "重启全部 = 先后端再前端"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "按钮有 loading 状态，防止重复点击"

timeout_seconds: 60
