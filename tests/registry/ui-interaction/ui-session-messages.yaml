id: "ui-session-messages"
name: "UI Interaction: Session Message List — 会话消息列表"
category: "ui-interaction"
source: "dashboard/web/src/components/common/SessionMessageList.tsx"
description: "验证 SessionMessageList 组件：Case AI Panel 的消息列表渲染、Agent Monitor 的 session 消息展示功能"
safety_level: "safe"
priority: "medium"
tags: ["ui", "interaction", "session-messages", "ai-panel", "round-10"]

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"

  - action: "verify_element"
    params:
      selector: "main"
      expected: "visible"
      timeout: 5000

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-session-messages-dashboard.jpg"

  - action: "navigate"
    params:
      url: "{frontend_url}/agents"
    safety_check: "ui.safe[navigate_to_page]"

  - action: "verify_element"
    params:
      selector: "main"
      expected: "visible"
      timeout: 5000

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-session-messages-agents.jpg"

assertions:
  - type: "no_console_errors"
    description: "会话消息列表无 JS 错误"
  - type: "element_not_present"
    selector: ".error-boundary-fallback"
    description: "无 error boundary 触发"
