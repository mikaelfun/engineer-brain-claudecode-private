id: "ui-track-progress"
name: "UI Interaction: Track Progress Panel — 实现进度追踪"
category: "ui-interaction"
source: "dashboard/web/src/components/TrackProgressPanel.tsx"
description: "验证 Track Progress Panel 功能：导航至 Issues 列表，检查 TrackProgressPanel 组件可访问，验证 /api/issues/:id/track-progress 端点响应"
safety_level: "safe"
priority: "medium"
tags: ["ui", "interaction", "track-progress", "implement", "round-9"]

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"

  - action: "click"
    params:
      target: "Issues nav item"
    safety_check: "ui.safe[click_sidebar_nav]"

  - action: "verify_element"
    params:
      selector: "main"
      expected: "visible"
      timeout: 5000

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-track-progress-issues.jpg"

  - action: "check_element"
    params:
      selector: "[class*='TrackProgress'], [class*='track-progress'], [data-testid='track-progress']"
      timeout: 3000
      optional: true

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-track-progress-detail.jpg"

assertions:
  - type: "element_visible"
    target: "issues page main content"
    expected: true
    description: "Issues 页面主内容区域可见"

  - type: "page_load"
    target: "/issues"
    expected: "loaded"
    description: "Issues 页面加载成功"

  - type: "no_console_errors"
    target: "page"
    description: "页面无严重控制台错误"

timeout_seconds: 45
