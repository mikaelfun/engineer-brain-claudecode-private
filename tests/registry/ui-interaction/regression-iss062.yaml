id: "regression-iss062"
name: "Regression: ISS-062 — Implement/Verify Panel 统一升级：消息分组折叠 + Cancel 按钮 + Store 统一"
category: "ui-interaction"
source: "issues/ISS-062.json"
description: "回归测试：验证 ISS-062 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-062"]
regression_for: "ISS-062"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Implement 状态迁移到 issueTrackStore（消除独立 implementStore）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "VerifyProgressPanel 增加 Cancel 按钮（运行中显示，点击取消验证）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "后端增加 cancel-verify endpoint"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "所有现有测试通过"

timeout_seconds: 60
