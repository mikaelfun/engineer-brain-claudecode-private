id: "regression-iss020"
name: "Regression: ISS-020 — Create Track 超时：conductor:new-track 等待交互输入但 UI 无反馈通道"
category: "ui-interaction"
source: "issues/ISS-020.json"
description: "回归测试：验证 ISS-020 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-020"]
regression_for: "ISS-020"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "plan.md 校验失败时标记为 failed（回退 pending），不标记为 tracked"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "前端 TrackProgressPanel 能正确展示 '创建失败：plan.md 为空' 的错误信息"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "增加 spec.md 内容校验（非空、包含 Summary/Acceptance Criteria 等关键结构）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "TypeScript 前后端编译通过"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "所有单元测试通过"

timeout_seconds: 60
