id: "ui-step-question-form"
name: "UI Interaction: Step Question Form — 步骤问题表单"
category: "ui-interaction"
source: "dashboard/web/src/components/common/StepQuestionForm.tsx"
description: "验证 StepQuestionForm 组件：AI Assistant 交互流程中问题表单可渲染，输入框可见，Submit 按钮可访问"
safety_level: "safe"
priority: "medium"
tags: ["ui", "interaction", "question-form", "ai-assistant", "round-10"]

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"

  - action: "verify_element"
    params:
      selector: "main"
      expected: "visible"
      timeout: 5000

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-step-question-form-main.jpg"

  - action: "navigate"
    params:
      url: "{frontend_url}/cases"
    safety_check: "ui.safe[navigate_to_page]"

  - action: "verify_element"
    params:
      selector: "main"
      expected: "visible"
      timeout: 5000

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-step-question-form-cases.jpg"

assertions:
  - type: "no_console_errors"
    description: "StepQuestionForm 渲染无 JS 错误"
  - type: "element_not_present"
    selector: ".error-boundary-fallback"
    description: "无 error boundary 触发"
