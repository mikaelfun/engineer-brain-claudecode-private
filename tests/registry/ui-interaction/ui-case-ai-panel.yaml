id: "ui-case-ai-panel"
name: "UI Interaction: Case Detail AI Panel — 消息发送与响应"
category: "ui-interaction"
source: "dashboard/web/src/pages/CaseDetail.tsx — AI Assistant panel"
description: "验证 Case Detail 页面的 AI Panel 存在且可交互：导航至 case 详情页、找到 AI Panel 入口、验证消息输入区存在"
safety_level: "safe"
priority: "high"
tags: ["ui", "interaction", "ai-panel", "case-detail", "round-7"]

steps:
  # Step 1: 导航至 Dashboard 首页
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"

  # Step 2: 导航至 Cases 列表
  - action: "click"
    params:
      target: "Cases nav item"
    safety_check: "ui.safe[click_sidebar_nav]"

  # Step 3: 验证 case 列表加载
  - action: "verify_element"
    params:
      selector: "table, [class*='case-list'], [data-testid='case-list']"
      expected: "visible"
      timeout: 5000

  # Step 4: 点击第一个 case 进入详情
  - action: "click"
    params:
      target: "first case row"
      selector: "table tbody tr:first-child, [class*='case-row']:first-child"
    safety_check: "ui.safe[click_table_row]"

  # Step 5: 验证 case 详情页加载
  - action: "verify_element"
    params:
      selector: "[class*='case-detail'], [data-testid='case-detail'], main"
      expected: "visible"
      timeout: 5000

  # Step 6: 截图 — case 详情页全貌
  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-case-ai-panel-detail.jpg"

  # Step 7: 寻找 AI Panel 入口（可能是 tab、button 或 panel）
  - action: "check_element"
    params:
      selector: "[data-testid='ai-panel'], [class*='ai-panel'], [class*='ai-assistant'], button[aria-label*='AI'], [role='tab']:has-text('AI')"
      timeout: 3000
      optional: true

assertions:
  # case 详情页正常加载
  - type: "element_visible"
    target: "case detail main content"
    expected: true
    description: "Case 详情页主内容区域可见"

  # 页面 URL 包含 case id
  - type: "page_load"
    target: "/cases/"
    expected: "loaded"
    description: "Case 详情页加载成功"

  # 无严重 JS 错误
  - type: "no_console_errors"
    target: "page"
    description: "页面无严重控制台错误"

timeout_seconds: 45
