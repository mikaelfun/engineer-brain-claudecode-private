id: "regression-iss040"
name: "Regression: ISS-040 — TrackProgressPanel 移除 Plan Overview — issue 详情已有 Plan 展示"
category: "ui-interaction"
source: "issues/ISS-040.json"
description: "回归测试：验证 ISS-040 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-040"]
regression_for: "ISS-040"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "TrackProgressPanel 不再显示 Plan Overview 折叠面板"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "PlanSummary 组件代码删除（无其他消费者）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Track 创建完成后仍显示 ✓ 完成状态"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "TypeScript 编译通过"

timeout_seconds: 60
