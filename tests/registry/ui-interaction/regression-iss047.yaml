id: "regression-iss047"
name: "Regression: ISS-047 — Issue 与 Track 状态统一 — Track metadata 作为单一事实源"
category: "ui-interaction"
source: "issues/ISS-047.json"
description: "回归测试：验证 ISS-047 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-047"]
regression_for: "ISS-047"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "TrackMetadata 类型新增 `issueId?: string` 和 `verification?: TrackVerification` 字段"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "`POST /:id/verify` 完成后把 verifyResult 写入 track metadata.verification，不写 issue JSO"

timeout_seconds: 60
