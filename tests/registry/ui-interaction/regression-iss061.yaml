id: "regression-iss061"
name: "Regression: ISS-061 — Create Track Cancel 后 Creating Track... 仍在转圈"
category: "ui-interaction"
source: "issues/ISS-061.json"
description: "回归测试：验证 ISS-061 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-061"]
regression_for: "ISS-061"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Cancel click immediately hides TrackProgressPanel (no spinner persistence)"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Recovery effect (ISS-055) does not re-arm tracking after cancel"

timeout_seconds: 60
