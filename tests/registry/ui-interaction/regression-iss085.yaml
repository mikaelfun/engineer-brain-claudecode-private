id: "regression-iss085"
name: "Regression: ISS-085 — Full Process 应继承已有 Session 而非总是新建"
category: "ui-interaction"
source: "issues/ISS-085.json"
description: "回归测试：验证 ISS-085 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-085"]
regression_for: "ISS-085"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "`processCaseSession` 在已有可 resume session 时 resume 而非新建"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "不影响 patrol（patrol 的 per-case agent 应独立）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "TypeScript 编译通过"

timeout_seconds: 60
