id: "regression-iss001"
name: "Regression: ISS-001 — Fix CaseAIPanel Double-Scroll Bug"
category: "ui-interaction"
source: "issues/ISS-001.json"
description: "回归测试：验证 ISS-001 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-001"]
regression_for: "ISS-001"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Full process streaming 时，内层消息列表自动滚动到最新消息"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Full process streaming 时，页面（外层）scrollbar 位置保持不变"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "手动滚动内层消息列表后，新消息到达时仍能自动追尾"

timeout_seconds: 60
