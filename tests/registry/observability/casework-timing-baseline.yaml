# Casework Timing Baseline — 检查 casework 性能是否退化
# 对应问题: 工作流变慢但功能仍然 PASS
# Probe 类型: metric (收集指标 + 对比基线)

id: "casework-timing-baseline"
name: "Casework Timing Baseline Check"
category: "observability"
source: "cases/active/*/timing.json"
description: "读取 case timing.json，对比 baselines.yaml 中的基线值，检测性能退化"
safety_level: "safe"
priority: "high"
tags: ["observability", "metric", "performance"]

probe_type: "metric"
baseline_ref: "casework_timing"

metrics:
  - name: "total_seconds"
    source: "timing.json"
    json_path: "totalSeconds"
    baseline_key: "casework_timing.total_seconds"

  - name: "dataRefresh_seconds"
    source: "timing.json"
    json_path: "steps.dataRefresh.seconds"
    baseline_key: "casework_timing.steps.dataRefresh"

  - name: "complianceCheck_seconds"
    source: "timing.json"
    json_path: "steps.complianceCheck.seconds"
    baseline_key: "casework_timing.steps.complianceCheck"

  - name: "statusJudge_seconds"
    source: "timing.json"
    json_path: "steps.statusJudge.seconds"
    baseline_key: "casework_timing.steps.statusJudge"

  - name: "teamsSearch_seconds"
    source: "timing.json"
    json_path: "steps.teamsSearch.seconds"
    baseline_key: "casework_timing.steps.teamsSearch"

  - name: "inspectionWriter_seconds"
    source: "timing.json"
    json_path: "steps.inspectionWriter.seconds"
    baseline_key: "casework_timing.steps.inspectionWriter"

steps:
  - action: "find_timing_files"
    params:
      glob: "cases/active/*/timing.json"
  - action: "collect_metrics"
    params:
      metrics_ref: "metrics"
  - action: "compare_baselines"
    params:
      baselines_file: "tests/baselines.yaml"

assertions:
  - type: "total_under_critical"
    expected: true
    description: "totalSeconds < baseline * critical_ratio"
  - type: "no_step_regression"
    expected: true
    description: "无单步骤超过 baseline * warn_ratio"

timeout_seconds: 30
