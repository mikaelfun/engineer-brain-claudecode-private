# Recovery Tools Registry
# Supervisor 推理匹配用 gateReason + description 做语义匹配，不做关键词 if-else。
# 新增恢复能力只需在此注册工具，supervisor 自动获得新的恢复能力。
#
# Schema:
#   name: 工具标识符
#   description: 适用场景描述（供 LLM 推理匹配 gateReason）
#   check: 诊断命令（返回 0 = 问题确认存在，非 0 = 问题不存在）
#   action: 恢复命令（可以是多步骤，用 && 连接）
#   fallback: 可选，当 action 失败时的备用恢复命令
#   safety: safe / review / dangerous
#   waitSeconds: 执行 action 后等待多少秒再重新检查

tools:
  - name: backend-restart
    description: >
      后端服务（localhost:3010）未运行或不可达。
      常见 gateReason 包含：health-check.sh produced no output、
      backend not running、connection refused、port 3010。
    check: "curl -sf -o /dev/null http://localhost:3010/api/health"
    action: "curl -sf -X POST http://localhost:3010/api/restart/backend"
    fallback: "cd dashboard && npx tsx src/index.ts &"
    safety: safe
    waitSeconds: 8

  - name: state-repair
    description: >
      state.json 损坏、JSON 解析失败、字段缺失或格式异常。
      常见 gateReason 包含：state.json、JSON parse、invalid JSON、
      SyntaxError、unexpected token。
    check: "node -e \"try{JSON.parse(require('fs').readFileSync('tests/state.json','utf8'));process.exit(1)}catch(e){process.exit(0)}\""
    action: "bash tests/executors/state-repair.sh"
    safety: safe
    waitSeconds: 2
