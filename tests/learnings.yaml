- id: timing-json-stale-fallback
  category: test
  problem: "poll_for_completion timing.json fallback checked file existence only, triggering premature completion from stale files left by previous casework runs"
  solution: |
    Two-pronged fix: (1) e2e-runner.sh removes timing.json before POST, (2) poll_for_completion checks mtime >= poll_start_epoch
  resolved_at: "2026-03-28"

- id: judge-field-paths
  category: test
  problem: "Test defs used judge.xxx paths but casehealth-meta.json stores fields at top level (emailCountAtJudge, not judge.emailCountAtJudge)"
  solution: |
    Remove judge. prefix from all json_field assertions referencing casehealth-meta.json
  resolved_at: "2026-03-28"

- id: local-outside-function
  category: test
  problem: "e2e-runner.sh setup actions parsing used local keyword outside functions (lines 156/189/208), causing silent failures in bash"
  solution: |
    Replace local with plain variable assignment in top-level script code
  resolved_at: "2026-03-28"

- id: node-posix-path
  category: test
  problem: "Node.js on Windows cannot read POSIX paths (/c/Users/...) — interprets as C:\c\Users\. modify_meta setup action in e2e-runner.sh silently failed."
  solution: |
    Convert POSIX to Windows path with cygpath -w before passing to Node. Use env vars (process.env.XX) instead of shell interpolation to avoid escaping issues.
  resolved_at: "2026-03-28"

- id: state-json-atomic-write
  category: framework
  problem: "Non-atomic writes to state.json (Write tool, heredoc, echo >) cause JSON corruption (trailing commas, stray brackets, truncated JSON) when combined with pipe/concurrent operations in Git Bash"
  solution: |
    Always use bash tests/executors/state-writer.sh for state.json writes. It validates JSON + required fields, then writes atomically via temp file + rename. Pass paths to node via env vars (STATE_PATH), never embed POSIX paths in node source code.
  resolved_at: "2026-03-28"

- id: auto-heal-20260328-1538
  category: framework
  problem: "Stale .progress-fast-path.json left from interrupted session (87 min old), causing false 'running' warning in health-check"
  solution: |
    Auto-healed: deleted stale progress file. Result file 0-fast-path.json already existed.
  resolved_at: "2026-03-28"

- id: obs-runner-unknown-probe
  category: test
  problem: "observability-runner.sh falls through to 'Unknown stability probe' for new probe IDs with custom learnings_checks (e.g. learnings-regression-infra)"
  solution: |
    Two options: (1) add explicit case for each new probe ID, (2) implement generic stability_config.learnings_checks runner that reads check_command from YAML. For now, manually executed checks inline when runner fails — all 7/7 passed.
  resolved_at: "2026-03-28"

- id: e2e-single-step-runner-design
  category: test
  problem: "e2e-runner.sh only executes first run_single_step action; multi-step chains not supported"
  solution: |
    Design workflow-e2e tests with single run_single_step per test; chain steps via API or use run_skill for multi-step workflows
  resolved_at: "2026-03-28"

- id: inspection-writer-changepath-standalone
  category: test
  problem: "inspection-writer skips case-summary.md when called via step API without changePath context (logs case-summary=skipped)"
  solution: |
    When testing inspection step standalone, assert on casehealth-meta.json + lastInspected + log file instead of case-summary.md; case-summary requires full casework context
  resolved_at: "2026-03-28"

- id: read-yaml-value-indent-bug
  category: framework
  problem: "read_yaml_value uses grep '^  *key:' requiring at least 1 leading space, cannot read top-level YAML keys"
  solution: |
    Changed to grep '^[[:space:]]*key:' in common.sh to support both top-level and indented keys
  resolved_at: "2026-03-29"

- id: wf-iss-context-path
  category: test
  problem: "wf-iss* assertion targets used deprecated cases/active/{id}/context/case-summary.md path"
  solution: |
    case-summary.md is in case root dir (no context/ subdir). Use cases/active/{test_case_id}/case-summary.md
  resolved_at: "2026-03-29"

- id: state-writer-truncation-guard-20260329
  category: framework
  problem: "state.json was truncated to 128 bytes (3 fields only) because a test-loop agent constructed a minimal {phase,round,stats} object and piped it through state-writer.sh, which did full-replace with no field-count validation"
  solution: |
    Added truncation guard (reject if >50% field loss) and --merge mode to state-writer.sh. Merge does shallow overlay, preserving fields not in input. Deep merges stats and roundJourney.
  resolved_at: "2026-03-29"

- id: state-truncation-automerge-20260329-142317
  category: test
  problem: "Truncation guard auto-merged: a caller passed a partial state object in full-replace mode. [WARN] TRUNCATION_GUARD: field count 15 → 3 (>50% loss). Auto-downgraded to merge."
  solution: |
    Auto-downgraded to merge. Caller should use --merge flag explicitly.
  resolved_at: "2026-03-29"

- id: corrupt-fixqueue-undefined-testid
  category: framework
  problem: "fixQueue contained 21 entries with undefined testId (no testId field), causing queue-recycler to recycle corrupt items into testQueue"
  solution: |
    Detect and remove entries with no testId field from testQueue after recycling. Root cause: likely a previous loop wrote partial/malformed objects to fixQueue without testId.
  resolved_at: "2026-03-29"

- id: retro-26-SCAN
  category: framework
  problem: "issue-scanner.sh isCovered() strips CJK via [^a-z0-9 ] regex — all Chinese ACs return false even when registry test exists, causing 83% false positive ISSUE_GAP rate in SCAN"
  solution: |
    Fix: replace regex with /[^\w\s]/g or /<[^>]+>/g to preserve CJK characters, then use unicode-aware word split
  resolved_at: "2026-03-29"

- id: meta-26
  category: framework
  problem: "verify-rerun.sh cannot find test definition for framework-category fix items (category='framework')"
  solution: |
    Framework fixes (retro-generated) have no registry entry — verify-rerun.sh assumes all verifyQueue items have registry YAML. Framework fixes should be auto-passed after smoke test validation or skipped by verify-rerun.sh when category=framework
  resolved_at: "2026-03-29"

- id: retro-26-FIX
  category: framework
  problem: "awk exit 0 inside rule is overridden by END{exit 1} — always use variable flag pattern in awk assertions"
  solution: |
    awk END block always runs and overrides exit code from inner rules. Use: awk '/pattern/{flag=1} END{exit (flag?0:1)}' instead of 'exit 0' inside rules
  resolved_at: "2026-03-29"

- id: verify-env-r26
  category: framework
  problem: "wf-iss142 e2e tests require dashboard backend at localhost:3010 — all 3 verify attempts failed with 'Backend not running'; regressionQueue skipped (15 items, same cause)"
  solution: |
    Environment dependency: e2e-runner.sh checks localhost:3010. Tests only verifiable when dashboard dev server is running (cd dashboard && npm run dev)
  resolved_at: "2026-03-29"

- id: meta-26-pattern-detector
  category: framework
  problem: "pattern-detector.sh exits 0 (patterns detected) but outputs no PATTERN_DETECT lines — silent failure due to NODE_PATH issue causing empty FIX_QUEUE_COUNT"
  solution: |
    NODE_PATH may not resolve node_modules in Git Bash; FIX_QUEUE_COUNT becomes empty string; empty-check fails silently → exit 0 with no output. Need to add exit 1 guard when FIX_QUEUE_COUNT is empty.
  resolved_at: "2026-03-29"

- id: meta-26-posix-paths
  category: framework
  problem: "POSIX path in node -e string interpolation fails on Windows. Systemic pattern in common.sh (lines 596,615,633,673) silently failing via 2>/dev/null. pattern-detector.sh root cause (fixed R26)."
  solution: |
    Convert to env var pattern: STATE_PATH=$path node -e ... process.env.STATE_PATH
  resolved_at: "2026-03-29"

- id: meta-26-no-result-file
  category: framework
  problem: "87% regression tests fail with no_result_file (13/15) — ui-runner/e2e-runner/visual-runner/api-runner not producing result files"
  solution: |
    Likely environment issue: backend/frontend not running during test execution. Alternatively, executor scripts may have path/config issues. Pattern-detector missed this because all tests are retry=0 (first-time failures in fixQueue). framework-fix items in verifyQueue cannot be verified (test_definition_not_found) — design gap in framework.
  resolved_at: "2026-03-29"

- id: env-issue-ui-tests-r26
  category: test-loop
  problem: "UI regression tests (regression-iss058, regression-iss064) have no_result_file in round 26"
  solution: |
    Frontend not running — these ui-interaction tests require dashboard to be accessible at localhost:3000. Tests use placeholder assertions (expected:'visible') and passed trivially in round 22.
  resolved_at: "2026-03-29"

- id: fix-r26-systemic-path-bug
  category: framework
  problem: "cases_root resolution failed for PROJECT_ROOT paths with spaces: sed \L modifier not supported on MSYS2 Git Bash, causing empty cases_root and malformed /active/<id> paths"
  solution: |
    Fix: (1) Added to_posix_path() helper in common.sh using bash string ops instead of sed \L; (2) Changed node config.json reads to use PROJ_ROOT env var pattern (PROJ_ROOT=... node -e ...) to avoid MSYS2 path conversion issues in -e arguments with spaces
  resolved_at: "2026-03-29"

- id: meta-26-env-detect
  category: framework
  problem: "100% VERIFY failure due to backend_not_running: e2e-runner.sh no_result_file vs env-skip gap"
  solution: |
    e2e-runner.sh should detect backend health at startup and output SKIP|env_issue:backend_not_running (like frontend_not_running precedent in skipRegistry)
  resolved_at: "2026-03-29"

- id: postflight-r26
  category: framework
  problem: "Stale progress file detected: framework-fix-26-pattern-detector (927s, threshold 900s)"
  solution: |
    framework-fix-26-pattern-detector stuck in verify_start step — pattern-detector executor may have hung; cleaned stale .progress file
  resolved_at: "2026-03-29"

- id: meta-r26-verify-regression
  category: framework
  problem: "VERIFY phase: 16/20 tests regressed (80% regression rate), verifyPassed=0 across all workflow-e2e tests"
  solution: |
    All wf-* tests stuck in verify_executing for e2e-runner.sh — systematic executor failure pattern, not individual test issues. Likely environment issue (frontend_not_running or e2e-runner.sh hang)
  resolved_at: "2026-03-29"

- id: supervisor-r26-fixqueue-overwrite
  category: framework
  problem: "state-writer --merge replaces array fields (fixQueue wiped from 16 to 1 item when injecting framework fix)"
  solution: |
    NEVER use echo '{"fixQueue":[single_item]}' | state-writer --merge — this replaces the entire array. Must read current fixQueue first, prepend new item, write full array. Or use a dedicated prepend-to-queue helper.
  resolved_at: "2026-03-29"

