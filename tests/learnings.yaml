# D365 脚本
# ============================================================

- id: d365-tab-guard
  category: d365
  problem: "D365 API 返回 null — 当前 tab 不在 D365 页面"
  solution: |
    D365 脚本入口统一加 tab 守卫（Ensure-D365Tab）
    确保在 D365 tab 上再调 API
  resolved_at: "2026-03-15"

- id: d365-param-name
  category: d365
  problem: "D365 脚本参数是 -TicketNumber 不是 -CaseNumber"
  solution: |
    所有 D365 脚本用 -TicketNumber
    -OutputDir 传父目录（cases/active/），不带 case number
  resolved_at: "2026-03-16"

- id: teams-filter-unsupported
  category: d365
  problem: "ListChatMessages 的 filter/orderby 不实际可用"
  solution: |
    用 SearchTeamsMessages 做时间窗增量入口
    命中的 chat 再用 ListChatMessages 全量拉取
    工具 schema 不等于后端真实能力
  resolved_at: "2026-03-16"

