- id: fetch-emails-false-positive
  category: test
  problem: "fetch-emails FAIL 误报 — 邮件正文中的 ❌ 触发错误检测"
  solution: |
    只扫描脚本输出最后 5 行判断 PASS/FAIL
    不扫描完整输出（包含邮件正文）
  resolved_at: "2026-03-28"

- id: node-kill-safety
  category: test
  problem: "taskkill /IM node.exe 会杀掉 Claude Code 进程"
  solution: |
    用 netstat 找端口占用的具体 PID，只杀特定 PID
    ❌ 绝不 taskkill /F /IM node.exe
    ❌ 绝不 killall node / pkill node
  resolved_at: "2026-03-21"

- id: casework-fresh-cache-slow
  category: test
  problem: "Fresh-cache casework run (all local data deleted) exceeds 900s — too slow for E2E test timeout"
  solution: |
    Use warm-cache test cases (keep existing context/emails.md). Or split full-scenario into: (1) API-responds-202 check (fast) + (2) output-file-exists check (run separately after warm-up). Don't delete all local data in setup.
  resolved_at: "2026-03-28"

