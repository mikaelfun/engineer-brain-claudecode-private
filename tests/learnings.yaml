  problem: "verify-rerun.sh returns error:test_definition_not_found for framework fix items (no registry entry). Framework fixes verified via code inspection instead."
  solution: |
    Framework fix items from Phase Retrospective should either: (A) have a lightweight registry entry with verification steps, or (B) verify-rerun.sh should detect category=framework and run alternate verification logic (git diff + code check instead of executor run).
