id: "wf-iss142-retro-skill"
name: "ISS-142 AC1 — test-loop SKILL.md 包含 Step 2.2 Phase Retrospective"
category: "workflow-e2e"
source: "issues/ISS-142.json"
description: "验证 ISS-142 AC1：test-loop SKILL.md 新增 Step 2.2 Phase Retrospective，位于 Step 2 和 Step 2.1 之间"
safety_level: "safe"
priority: "high"
tags: ["issue-driven", "iss-142", "phase-retrospective", "implemented"]

steps:
  - action: "bash_command"
    params:
      command: "grep -n 'Step 2.2' .claude/skills/test-loop/SKILL.md | head -3"
    description: "检查 SKILL.md 包含 Step 2.2 Phase Retrospective"

assertions:
  - type: "bash_exit_zero"
    target: "grep -q 'Step 2.2' .claude/skills/test-loop/SKILL.md"
    description: "SKILL.md 包含 Step 2.2 章节标题"

  - type: "bash_exit_zero"
    target: "grep -q 'Phase Retrospective' .claude/skills/test-loop/SKILL.md"
    description: "SKILL.md 包含 Phase Retrospective 关键词"

  - type: "bash_exit_zero"
    target: "python3 -c \"import sys; c=open('.claude/skills/test-loop/SKILL.md',encoding='utf-8').read(); p22=c.find('Step 2.2'); p21=c.find('Step 2.1'); sys.exit(0 if p22>=0 and p21>=0 and p22<p21 else 1)\""
    description: "Step 2.2 位于 Step 2.1 之前（正确顺序）"

timeout_seconds: 30
