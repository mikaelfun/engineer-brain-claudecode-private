  - type: "bash_output_not_contains"
    target: "grep -n \"currentStage === 'TEST' ? 'running' : 'done'\" tests/executors/health-check.sh 2>/dev/null || grep -n 'currentStage.*===.*FIX.*done\\|currentStage.*===.*VERIFY.*done' tests/executors/health-check.sh 2>/dev/null || echo ''"
    expected: "done"
    description: "health-check.sh must not unconditionally override stage status with done based on currentStage heuristic"

