id: "arch-scanner-direct-state-write"
name: "Architecture — Scanner uses state-writer.sh instead of direct JSON writes"
category: "workflow-e2e"
source: "arch-scan"
description: "Verify that architecture-scanner.sh uses state-writer.sh for state updates (not echo >, heredoc, etc.)"
safety_level: "safe"
priority: "P2"
tags: ["architecture", "state-management", "atomic-writes", "cycle-41"]

steps:
  - action: "bash_command"
    params:
      command: "grep -nE '(echo|cat).*>.*state\.json' tests/executors/architecture-scanner.sh 2>&1 | wc -l"
    safety_check: "scripts.safe[compliance-check]"

assertions:
  - type: "text_equals"
    target: "command_output"
    expected: "0"
    description: "No direct state.json writes (must use state-writer.sh)"

timeout_seconds: 30
