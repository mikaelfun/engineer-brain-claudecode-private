id: "iss-184-patrol-sse-content"
name: "ISS-184 — Patrol SSE messages contain actual content"
category: "workflow-e2e"
source: "issues/ISS-184.json"
description: "验证 ISS-184: During patrol, each case's SSE messages contain actual thinking text, tool names, and tool input summaries (not empty strings)"
safety_level: "safe"
data_source: live
live_pool: "data_rich"
priority: "high"
tags: ["issue-driven", "iss-184", "patrol", "sse"]
recipe_used: "none"

steps:
  - action: "bash_command"
    params:
      command: |
        # Check that SSE event handling in patrol route emits content
        grep -n "thinking\|tool_name\|tool_input\|content\|text" dashboard/src/routes/patrol.ts 2>/dev/null | head -10
        if [ $? -ne 0 ]; then
          grep -n "thinking\|tool_name\|tool_input\|content\|text" dashboard/src/routes/cases.ts 2>/dev/null | head -10
        fi
    description: "Verify SSE content fields in patrol/case routes"

assertions:
  - type: "bash_exit_zero"
    target: "grep -rq 'thinking\\|content_block' dashboard/src/routes/ 2>/dev/null"
    description: "SSE routes handle thinking/content blocks"

  - type: "bash_exit_zero"
    target: "grep -rq 'tool_use\\|tool_name\\|toolName' dashboard/src/routes/ 2>/dev/null"
    description: "SSE routes handle tool use events"

timeout_seconds: 15
