id: "wf-iss120-backward-compat"
name: "ISS-120 — 向后兼容：test_case_id 仍然有效"
category: "workflow-e2e"
source: "issues/ISS-120.json"
description: "验证 ISS-120 AC：已有测试（使用 test_case_id）在新 data_source 机制下仍然正常工作（向后兼容）"
safety_level: "safe"
priority: "medium"
tags: ["issue-driven", "iss-120", "tracked", "regression"]

steps:
  - action: "bash_command"
    params:
      command: "grep -r 'test_case_id:' tests/registry/workflow-e2e/*.yaml | grep -v 'data_source' | head -5"
    description: "找出仍使用 test_case_id 而非 data_source 的测试（向后兼容测试目标）"
  - action: "bash_command"
    params:
      command: "cat tests/executors/e2e-runner.sh | grep -A5 'elif.*TEST_CASE_ID'"
    description: "确认 e2e-runner.sh 保留了 test_case_id 支持分支"

assertions:
  - type: "bash_exit_zero"
    target: "grep -q 'TEST_CASE_ID\\|test_case_id' tests/executors/e2e-runner.sh"
    description: "e2e-runner.sh 仍保留 test_case_id 模式支持"
  - type: "bash_exit_zero"
    target: "grep -q 'elif.*TEST_CASE_ID\\|if.*TEST_CASE_ID' tests/executors/e2e-runner.sh"
    description: "test_case_id 有独立处理分支（与 data_source 共存）"

timeout_seconds: 30
