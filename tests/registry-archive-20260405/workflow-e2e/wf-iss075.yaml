id: "wf-iss075"
name: "ISS-075 — AI Assistant Session 面板优化：过滤 completed、布局调整、Stop 按钮、多 Tab 切换"
category: "workflow-e2e"
source: "issues/ISS-075.json"
description: "验证 ISS-075（implemented）的验收标准：每个 active/paused session 有独立 Stop 按钮"
safety_level: "safe"
data_source: live
live_pool: "data_rich"
priority: "high"
tags: ["issue-driven", "iss-075", "implemented"]

steps:
  - action: "run_skill"
    params:
      skill: "data-refresh"
      case_id: "{live_case_id}"
    safety_check: "scripts.safe[data-refresh]"

assertions:
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "每个 active/paused session 有独立 Stop 按钮"

timeout_seconds: 120
