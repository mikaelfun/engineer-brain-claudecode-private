id: "syn-status-stale"
name: "Synthetic — Status: Stale Case (12+ days no interaction)"
category: "workflow-e2e"
source: "issues/ISS-177.json"
description: "Generate status-stale synthetic case → verify casehealth-meta.json daysSinceLastContact=12, FWR expired"
safety_level: "safe"
priority: "medium"
tags: ["synthetic", "status-judge", "iss-177"]

data_source: synthetic
synthetic_profile: status-stale

steps:
  - action: "run_script"
    params:
      command: "echo 'Synthetic case generated at {case_dir}'"

assertions:
  - type: "file_exists"
    target: "{case_dir}/case-info.md"
    expected: true
    description: "case-info.md generated"
  - type: "file_content"
    target: "{case_dir}/casehealth-meta.json"
    expected: "valid_json"
    description: "casehealth-meta.json is valid JSON"
  - type: "json_field"
    target: "{case_dir}/casehealth-meta.json"
    field: "daysSinceLastContact"
    expected: "not_null"
    description: "daysSinceLastContact is set (should be 12)"
  - type: "file_content"
    target: "{case_dir}/casehealth-meta.json"
    expected: "Expired"
    description: "FWR status is Expired"

timeout_seconds: 30
