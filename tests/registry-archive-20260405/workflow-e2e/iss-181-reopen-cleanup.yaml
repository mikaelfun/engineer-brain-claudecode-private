id: "iss-181-reopen-cleanup"
name: "ISS-181 — Reopen clears old trackId and metadata"
category: "workflow-e2e"
source: "issues/ISS-181.json"
description: "验证 ISS-181: Reopen 时清空旧的 trackId、verifyResult、closedReason、closedAt，status 回到 pending"
safety_level: "safe"
priority: "high"
tags: ["issue-driven", "iss-181", "reopen", "issue-lifecycle"]
recipe_used: "none"

steps:
  - action: "bash_command"
    params:
      command: |
        # Check that reopen logic in issue handler clears metadata fields
        ISSUE_HANDLER=$(find dashboard/src -name "*.ts" -exec grep -l "reopen\|re-open" {} \; 2>/dev/null | head -3)
        if [ -z "$ISSUE_HANDLER" ]; then
          ISSUE_HANDLER=$(find . -path "*/skills/issue/*" -name "*.md" 2>/dev/null | head -1)
        fi
        echo "Found handlers: $ISSUE_HANDLER"
    description: "Locate reopen logic in codebase"

assertions:
  - type: "bash_exit_zero"
    target: "grep -rq 'reopen\\|re-open\\|REOPEN' dashboard/src/routes/issues.ts 2>/dev/null || grep -rq 'reopen' .claude/skills/issue/SKILL.md 2>/dev/null"
    description: "Reopen logic exists in issue routes or skill"

  - type: "bash_exit_zero"
    target: "grep -rq 'trackId.*null\\|trackId.*undefined\\|delete.*trackId\\|trackId.*\"\"' dashboard/src/routes/issues.ts 2>/dev/null || grep -rq 'trackId' .claude/skills/issue/SKILL.md 2>/dev/null"
    description: "Reopen clears trackId"

timeout_seconds: 15
