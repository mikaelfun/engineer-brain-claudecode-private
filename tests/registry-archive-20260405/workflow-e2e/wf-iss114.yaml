id: "wf-iss114"
name: "ISS-114 — 自动化测试框架重构：文件驱动状态机 + 主-子Agent + /loop 持续迭代"
category: "workflow-e2e"
source: "issues/ISS-114.json"
description: "验证 ISS-114（tracked）的验收标准：`tests/` 目录结构完整 — state.json（状态机）、safety.yaml（安全清单）、env.yaml"
safety_level: "safe"
data_source: live
live_pool: "data_rich"
priority: "medium"
tags: ["issue-driven", "iss-114", "tracked"]

steps:
  - action: "run_skill"
    params:
      skill: "data-refresh"
      case_id: "{live_case_id}"
    safety_check: "scripts.safe[data-refresh]"

assertions:
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "`tests/` 目录结构完整 — state.json（状态机）、safety.yaml（安全清单）、env.yaml（环境常量）、learnings.yam"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "状态机正确驱动 SCAN→GENERATE→TEST→FIX→VERIFY 循环 — 每个阶段读/写 state.json，阶段转换逻辑正确"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "后端 API 测试覆盖 — 所有 42 个端点自动生成测试定义并可执行"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "需求驱动发现 — SCAN 阶段扫描 issues/、conductor/tracks/、.claude/skills/、dashboard/src/，发现新功"

timeout_seconds: 120
