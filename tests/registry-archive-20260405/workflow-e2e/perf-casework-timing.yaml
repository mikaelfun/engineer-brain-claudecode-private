id: perf-casework-timing
name: "Performance: Casework Timing Within 1.2x Baseline"
category: workflow-e2e
source: "performance-scanner.sh (casework total 559s vs 405s baseline, 1.4x)"
safety_level: safe
recipe_used: performance-test.md
priority: P2
description: >
  Verifies that full casework end-to-end timing stays within acceptable drift bounds.
  Current: 559s (1.38x baseline 405s). Target: ≤ 1.2x = ≤ 486s.
  Investigates which casework phases are taking extra time.

steps:
  - action: bash
    params:
      command: >
        cat cases/active/$(ls cases/active/ | head -1)/timing.json
      description: "Read latest casework timing data"
  - action: bash
    params:
      command: >
        node -e "
        const t = require('./cases/active/$(ls cases/active/ | head -1)/timing.json');
        const total = t.totalMs || t.total || 0;
        const baseline = 405000;
        const ratio = total / baseline;
        console.log(JSON.stringify({total, baseline, ratio, phases: t.phases || {}}));
        "
      description: "Calculate timing ratio vs baseline"

assertions:
  - type: timing_under
    metric: "casework_total_ms"
    baseline_ms: 405000
    max_ratio: 1.2
    description: "Casework total ≤ 1.2x baseline (486s)"
  - type: json_field_lte
    field: "ratio"
    expected: 1.2
    description: "Timing ratio ≤ 1.2"

tags: [performance, timing, casework, drift]
createdAt: "2026-04-01"
createdByCycle: 42
