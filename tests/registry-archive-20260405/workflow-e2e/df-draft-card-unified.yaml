id: "df-draft-card-unified"
name: "Design Fidelity: CaseDetail DraftCard 和 DraftsPage DraftCard 行为统一"
category: "workflow-e2e"
source: "design-fidelity"
description: "验证 CaseDetail.tsx 和 DraftsPage.tsx 都实现了 DraftCard 组件，且具备相同的核心功能（展开/收起、复制、编辑）"
safety_level: "safe"
priority: "high"
recipe_used: "design-fidelity-test.md"
tags: ["design-fidelity", "draft-rich-copy", "draft-card"]

steps:
  - action: "bash_command"
    params:
      command: "grep -c \"function DraftCard\\|DraftCard\" dashboard/web/src/pages/CaseDetail.tsx"
    safety_check: "scripts.safe[compliance-check]"
  - action: "bash_command"
    params:
      command: "grep -c \"function DraftCard\\|DraftCard\" dashboard/web/src/pages/DraftsPage.tsx"
    safety_check: "scripts.safe[compliance-check]"
  - action: "bash_command"
    params:
      command: "for f in dashboard/web/src/pages/CaseDetail.tsx dashboard/web/src/pages/DraftsPage.tsx; do grep -c \"copy\\|copied\\|Copy\" $f; done | paste - - | awk '{if($1>0 && $2>0) print \"both_have_copy\"; else print \"missing_copy\"}'"
    safety_check: "scripts.safe[compliance-check]"

assertions:
  - type: "text_gt"
    target: "step1_output"
    expected: "0"
    description: "CaseDetail.tsx must have DraftCard definition or usage"
  - type: "text_gt"
    target: "step2_output"
    expected: "0"
    description: "DraftsPage.tsx must have DraftCard definition or usage"
  - type: "text_contains"
    target: "step3_output"
    expected: "both_have_copy"
    description: "Both DraftCard implementations must have copy functionality"

timeout_seconds: 30
