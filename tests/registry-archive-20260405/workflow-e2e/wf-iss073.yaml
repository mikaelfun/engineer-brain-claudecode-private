id: "wf-iss073"
name: "ISS-073 — WebUI Issue 点击 Implement 后应自动滚动到当前 Issue 保持追踪"
category: "workflow-e2e"
source: "issues/ISS-073.json"
description: "验证 ISS-073（implemented）的验收标准：不影响其他 issue 行的展开/折叠行为"
safety_level: "safe"
data_source: live
live_pool: "data_rich"
priority: "high"
tags: ["issue-driven", "iss-073", "implemented"]

steps:
  - action: "run_skill"
    params:
      skill: "data-refresh"
      case_id: "{live_case_id}"
    safety_check: "scripts.safe[data-refresh]"

assertions:
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "不影响其他 issue 行的展开/折叠行为"

timeout_seconds: 120
