id: "syn-inspection-heavy"
name: "Synthetic — Inspection: Heavy Case (ICM linked, 90d, 45 emails)"
category: "workflow-e2e"
source: "issues/ISS-177.json"
description: "Generate heavy synthetic case → verify ICM info present, high email/note count, Sev A, pending-pg status"
safety_level: "safe"
priority: "medium"
tags: ["synthetic", "inspection", "iss-177"]

data_source: synthetic
synthetic_profile: heavy

steps:
  - action: "run_script"
    params:
      command: "echo 'Synthetic case generated at {case_dir}'"

assertions:
  - type: "file_exists"
    target: "{case_dir}/case-info.md"
    expected: true
    description: "case-info.md generated"
  - type: "file_content"
    target: "{case_dir}/case-info.md"
    expected: "Sev A"
    description: "Severity is A"
  - type: "file_content"
    target: "{case_dir}/casehealth-meta.json"
    expected: "valid_json"
    description: "casehealth-meta.json is valid JSON"
  - type: "json_field"
    target: "{case_dir}/casehealth-meta.json"
    field: "actualStatus"
    expected: "pending-pg"
    description: "Status is pending-pg (ICM active)"

timeout_seconds: 30
