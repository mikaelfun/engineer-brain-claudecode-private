id: "wf-iss049"
name: "ISS-049 — Create Track 交互提问内容应放在交互框里，字体更大更突出"
category: "workflow-e2e"
source: "issues/ISS-049.json"
description: "验证 ISS-049（implemented）的验收标准：用户回答后对话框关闭，SSE 流继续正常展示"
safety_level: "safe"
data_source: live
live_pool: "data_rich"
priority: "high"
tags: ["issue-driven", "iss-049", "implemented"]

steps:
  - action: "run_skill"
    params:
      skill: "data-refresh"
      case_id: "{live_case_id}"
    safety_check: "scripts.safe[data-refresh]"

assertions:
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "用户回答后对话框关闭，SSE 流继续正常展示"

timeout_seconds: 120
