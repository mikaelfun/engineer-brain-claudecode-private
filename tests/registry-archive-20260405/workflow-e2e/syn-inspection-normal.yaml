id: "syn-inspection-normal"
name: "Synthetic — Inspection: Normal Case Profile"
category: "workflow-e2e"
source: "issues/ISS-177.json"
description: "Generate normal synthetic case → verify case-info.md has standard fields (severity B, Premier service, China contact)"
safety_level: "safe"
priority: "medium"
tags: ["synthetic", "inspection", "iss-177"]

data_source: synthetic
synthetic_profile: normal

steps:
  - action: "run_script"
    params:
      command: "echo 'Synthetic case generated at {case_dir}'"

assertions:
  - type: "file_exists"
    target: "{case_dir}/case-info.md"
    expected: true
    description: "case-info.md generated"
  - type: "file_content"
    target: "{case_dir}/case-info.md"
    expected: "Sev B"
    description: "Severity is B"
  - type: "file_content"
    target: "{case_dir}/case-info.md"
    expected: "Premier"
    description: "Service level is Premier"
  - type: "file_content"
    target: "{case_dir}/casehealth-meta.json"
    expected: "valid_json"
    description: "casehealth-meta.json is valid JSON"
  - type: "json_field"
    target: "{case_dir}/casehealth-meta.json"
    field: "compliance.entitlementOk"
    expected: true
    description: "Default profile passes compliance"

timeout_seconds: 30
