id: "wf-iss132"
name: "ISS-132 — SCAN 阶段回收 regression/retry/unverified 旧问题"
category: "workflow-e2e"
source: "issues/ISS-132.json"
description: "验证 ISS-132（tracked）的验收标准：SCAN 阶段开头检查 regressionQueue，将其中所有项移入 testQueue 重跑"
safety_level: "safe"
data_source: live
live_pool: "data_rich"
priority: "medium"
tags: ["issue-driven", "iss-132", "tracked"]

steps:
  - action: "run_skill"
    params:
      skill: "data-refresh"
      case_id: "{live_case_id}"
    safety_check: "scripts.safe[data-refresh]"

assertions:
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "SCAN 阶段开头检查 regressionQueue，将其中所有项移入 testQueue 重跑"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "SCAN 阶段开头检查 fixQueue 中 retryCount < 3 的项，回收到 testQueue 重试"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "SCAN 阶段开头检查 verifyQueue，将未验证的项移入 testQueue 补验证"
  - type: "file_exists"
    target: "cases/active/{test_case_id}/case-summary.md"
    description: "回收后清空原 queue 中已移动的项（避免重复处理）"

timeout_seconds: 120
