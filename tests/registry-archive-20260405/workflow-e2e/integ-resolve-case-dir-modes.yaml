id: "integ-resolve-case-dir-modes"
name: "Integration — resolve_case_dir handles all data_source modes"
category: "workflow-e2e"
source: "wf-regression-scan"
description: "Integration test: verify e2e-runner resolve_case_dir returns valid case dir for live, synthetic, and static (test_case_id) modes. Guards against 77% wf regression rate."
safety_level: "safe"
priority: "critical"
tags: ["regression-guard", "integration", "infrastructure"]
recipe_used: "none"

steps:
  - action: "bash_command"
    params:
      command: |
        source tests/executors/common.sh
        ERRORS=0
        # Mode 1: live
        LIVE_RESULT=$(select_live_case "data_rich" 2>/dev/null)
        if [ -z "$LIVE_RESULT" ]; then echo "FAIL: live/data_rich empty"; ERRORS=$((ERRORS+1)); else echo "PASS: live → $LIVE_RESULT"; fi
        # Mode 2: synthetic
        if [ -f tests/fixtures/synthetic/generator.sh ]; then
          SYN_RESULT=$(bash tests/fixtures/synthetic/generator.sh normal $RANDOM 2>&1 | grep "Generated synthetic case:" | sed 's/.*: //')
          if [ -z "$SYN_RESULT" ]; then echo "FAIL: synthetic empty"; ERRORS=$((ERRORS+1)); else echo "PASS: synthetic → $SYN_RESULT"; fi
        else
          echo "SKIP: generator.sh not found"
        fi
        exit $ERRORS
    description: "Test all resolve_case_dir modes (live + synthetic)"

assertions:
  - type: "bash_exit_zero"
    target: "source tests/executors/common.sh && type resolve_case_dir >/dev/null 2>&1"
    description: "resolve_case_dir function exists in common.sh"

  - type: "bash_exit_zero"
    target: "source tests/executors/common.sh && type select_live_case >/dev/null 2>&1"
    description: "select_live_case function exists in common.sh"

timeout_seconds: 30
