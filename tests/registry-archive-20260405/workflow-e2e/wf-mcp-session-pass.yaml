id: "wf-mcp-session-pass"
name: "MCP Session Fix — createSession mcpServers 参数传递验证"
category: "workflow-e2e"
source: "ISS-134 / conductor/tracks/mcp-session-fix_20260329/spec.md"
description: "验证 case-session-manager.ts 的 createSession() 传递 mcpServers 配置，确保 spawned session 可访问 MCP 服务"
safety_level: "safe"
priority: "high"
tags: ["mcp", "session-manager", "bug-fix", "infrastructure"]

source_type: "issue-driven"
issueId: "ISS-134"
trackId: "mcp-session-fix_20260329"

steps:
  # AC1: 检查 createSession() 源码包含 mcpServers 参数
  - action: "run_bash"
    params:
      command: "grep -n 'mcpServers' dashboard/src/agent/case-session-manager.ts"
      cwd: "{project_root}"
    safety_check: "scripts.safe[read-only]"
    timeout_seconds: 10

  # AC3: 检查现有 session 功能不受影响 — 运行单元测试
  - action: "run_bash"
    params:
      command: "cd dashboard && npm test -- --testPathPattern=case-session-manager --passWithNoTests 2>&1 | tail -20"
      cwd: "{project_root}"
    safety_check: "scripts.safe[unit-test]"
    timeout_seconds: 120

assertions:
  # AC1: createSession 包含 mcpServers 参数传递
  - type: "stdout_contains"
    expected: "mcpServers"
    description: "case-session-manager.ts must contain mcpServers parameter"
    step: 0

  # AC4: 单元测试通过（没有因 mcpServers 变更而失败）
  - type: "stdout_not_contains"
    expected: "FAIL"
    description: "Unit tests must not fail after mcpServers fix"
    step: 1

timeout_seconds: 150
