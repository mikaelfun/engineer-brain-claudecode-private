id: "ui-theme-responsive"
name: "Theme + Responsive — 暗色/浅色模式 + 窗口大小"
category: "ui-visual"
source: "playbooks/guides/casework-evolution-loop.md — Scenario G Step 2"
description: "验证主题切换、响应式布局"
safety_level: "safe"
priority: "medium"
tags: ["evolution-loop", "scenario-g", "visual"]

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "screenshot"
    params:
      name: "dashboard-default-theme"
      type: "jpeg"
    safety_check: "ui.safe[take_screenshot]"
  - action: "click"
    params:
      target: "theme toggle button"
    safety_check: "ui.safe[switch_theme]"
  - action: "screenshot"
    params:
      name: "dashboard-alt-theme"
      type: "jpeg"
  - action: "resize"
    params:
      width: 768
      height: 1024
    safety_check: "ui.safe[resize_window]"
  - action: "screenshot"
    params:
      name: "dashboard-tablet"
      type: "jpeg"
  - action: "resize"
    params:
      width: 1280
      height: 720
    safety_check: "ui.safe[resize_window]"

assertions:
  - type: "screenshot_match"
    target: "dashboard-default-theme"
    expected: "sidebar visible, dark/light theme applied"
  - type: "screenshot_match"
    target: "dashboard-alt-theme"
    expected: "theme changed from default"
  - type: "screenshot_match"
    target: "dashboard-tablet"
    expected: "responsive layout, sidebar collapsed or adapted"

timeout_seconds: 60
