id: df-testlab-stage-card
name: "Design Fidelity: TestLab stage cards with icons and glow animation"
category: ui-visual
source: design-fidelity
description: "验证 testlab-ui-polish spec AC: Stage card 包含大图标+名称+状态指示器"
safety_level: safe
priority: high
tags: ["design-fidelity", "testlab-ui-polish_20260330"]
recipe_used: design-fidelity-test.md
steps:
