id: df-sidebar-layout
name: "Design Fidelity: Left sidebar fixed at 220px"
category: ui-visual
source: design-fidelity
description: "验证 design-system-integration spec AC: 布局从顶部导航改为左侧固定侧边栏（220px）"
safety_level: safe
priority: high
tags: ["design-fidelity", "design-system-integration_20260321"]
recipe_used: design-fidelity-test.md
steps:
  - action: playwright_navigate
    params:
      url: "http://localhost:5173"
  - action: playwright_evaluate
    params:
      expression: "JSON.stringify((() => { const s = document.querySelector('nav, aside, [data-testid=sidebar]'); return s ? { w: s.getBoundingClientRect().width, pos: getComputedStyle(s).position } : null; })())"
assertions:
  - type: element_visible
    target: "nav, aside, [data-testid='sidebar']"
    expected: true
timeout_seconds: 60