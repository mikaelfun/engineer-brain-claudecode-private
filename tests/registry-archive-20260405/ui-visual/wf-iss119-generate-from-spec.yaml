id: "wf-iss119-generate-from-spec"
name: "ISS-119 — GENERATE 阶段从 spec.md 验收标准生成测试定义 YAML"
category: "ui-visual"
source: "issues/ISS-119.json"
description: "验证 ISS-119 AC：Test-Loop GENERATE 阶段能从 spec.md 验收标准生成测试定义 YAML，正确分类为 E2E/Interaction/Visual/API/Skip"
safety_level: "safe"
priority: "medium"
tags: ["issue-driven", "iss-119", "generate", "spec-driven"]

steps:
  - action: "bash_command"
    params:
      command: "bash tests/executors/spec-scanner.sh 2>&1 | grep -E 'SPEC_SCAN|SPEC_GAP' | head -5"
    description: "验证 spec-scanner.sh 能扫描 conductor/tracks/ 提取 AC"

  - action: "bash_command"
    params:
      command: "ls tests/registry/ui-visual/*.yaml tests/registry/ui-interaction/*.yaml tests/registry/workflow-e2e/*.yaml 2>/dev/null | wc -l"
    description: "测试定义已按分类存在于对应 category 目录"

  - action: "bash_command"
    params:
      command: "grep -rn 'spec-driven\\|source.*spec' tests/registry/workflow-e2e/*.yaml 2>/dev/null | wc -l"
    description: "检查已有 spec-driven 标签的测试定义数量"

assertions:
  - type: "file_exists"
    target: "tests/executors/spec-scanner.sh"
    description: "GENERATE 阶段依赖 spec-scanner.sh 提取 AC"

  - type: "file_content"
    target: ".claude/skills/test-loop/SKILL.md"
    expected: "spec-driven"
    description: "SKILL.md GENERATE 阶段包含 spec-driven gap 处理逻辑，正确分类为 E2E/Interaction/Visual/API/Skip"

timeout_seconds: 30
