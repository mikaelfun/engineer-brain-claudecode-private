id: df-theme-switch-persist
name: "Design Fidelity: Theme switch with dark/light/system modes + localStorage persistence"
category: ui-visual
source: design-fidelity
description: "验证 design-system-integration spec AC: 主题切换按钮支持 dark/light/system + 偏好持久化"
safety_level: safe
priority: high
tags: ["design-fidelity", "design-system-integration_20260321"]
recipe_used: design-fidelity-test.md
steps:
  - action: playwright_navigate
    params:
      url: "http://localhost:5173"
  - action: playwright_evaluate
    params:
      expression: "document.querySelector('[data-testid=theme-toggle], .theme-toggle, button[aria-label*=theme]') !== null"
  - action: playwright_evaluate
    params:
      expression: "localStorage.getItem('theme') || localStorage.getItem('themeMode') || 'none'"
assertions:
  - type: element_visible
    target: "[data-testid='theme-toggle'], .theme-toggle"
    expected: true
timeout_seconds: 60