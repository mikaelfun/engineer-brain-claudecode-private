id: "visual-issue-page"
name: "Issues Page Visual Layout"
category: "ui-visual"
source: "dashboard/web/src/pages/Issues.tsx — issues list page"
description: "验证 Issues 页面的视觉布局：列表渲染、状态过滤器、标签显示、暗色/浅色主题一致性"
safety_level: "safe"
priority: "medium"
tags: ["ui", "visual", "issues", "layout", "round-6"]

steps:
  # Step 1: Navigate to issues page
  - action: "navigate"
    params:
      url: "{base_url}/issues"

  # Step 2: Capture issues list layout
  - action: "screenshot"
    params:
      selector: "main"
      filename: "visual-issue-page-light.jpg"

  # Step 3: Check issue cards render
  - action: "check_element"
    params:
      selector: "[data-testid='issue-list'], .issue-list, main table, main [class*='issue']"
      timeout: 3000

  # Step 4: Check status filter elements exist
  - action: "check_element"
    params:
      selector: "button, select, [role='tab']"
      timeout: 2000

  # Step 5: Toggle dark mode if possible
  - action: "check_element"
    params:
      selector: "[data-testid='theme-toggle'], button[aria-label*='theme'], button[aria-label*='dark']"
      timeout: 1000
      optional: true

  # Step 6: Capture final state
  - action: "screenshot"
    params:
      selector: "body"
      filename: "visual-issue-page-final.jpg"

assertions:
  - type: "page_load"
    target: "/issues"
    expected: "loaded"
    description: "Issues 页面正常加载"

  - type: "element_present"
    target: "main content area"
    selector: "main"
    description: "主内容区域存在"

  - type: "no_console_errors"
    target: "page"
    description: "页面无严重控制台错误"

timeout_seconds: 30
