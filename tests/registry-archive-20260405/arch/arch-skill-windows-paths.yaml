# Test Definition: arch-skill-windows-paths
# Generated from architecture scanner gap
# Category: workflow-e2e (architecture compliance)
# Priority: P2

id: arch-skill-windows-paths
category: workflow-e2e
title: SKILL.md files should use POSIX paths (not Windows-style)
description: |
  CLAUDE.md requires all paths in SKILL.md to use POSIX format (/c/Users/...)
  instead of Windows format (C:\Users\...) for Git Bash compatibility.

  This test scans all .claude/skills/*/SKILL.md files and ensures no Windows-style
  paths are present (C:\ or backslashes in paths).

source: arch-scan
type: architecture
priority: P2
safety_level: SAFE

acceptance_criteria:
  - All SKILL.md files use POSIX paths only
  - No C:\ drive letter format found
  - No backslashes in file paths (except in quoted strings)
  - Compliant with CLAUDE.md Git Bash path format rule

assertions:
  - type: file_content
    description: Scan SKILL.md files for Windows-style paths
    command: |
      grep -r 'C:\\' .claude/skills/*/SKILL.md || echo "PASS"
    expected_output: "PASS"

  - type: file_content
    description: Check for backslash path separators
    command: |
      # Exclude quoted strings and code blocks
      grep -r '[^"]\\[^"]' .claude/skills/*/SKILL.md | grep -v '```' || echo "PASS"
    expected_output: "PASS"

fix_hint: |
  Convert Windows paths to POSIX format:
  - C:\Users\... → /c/Users/...
  - Backslashes → forward slashes
  - Update SKILL.md files with correct format

recipe_used: none
