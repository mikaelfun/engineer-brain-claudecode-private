id: "wf-iss119"
name: "ISS-119 — Test-Loop 吸收 Conductor:Verify 精华 + Conductor:Verify 瘦身"
category: "unit-test"
source: "issues/ISS-119.json"
description: "验证 ISS-119（tracked）的验收标准：Test-Loop 新增 `unit-test` category，有 `unit-runner.sh` executo"
safety_level: "safe"
priority: "medium"
tags: ["issue-driven", "iss-119", "tracked"]

steps:
  - action: "run_command"
    params:
      command: "cd dashboard && npm test -- --run 2>&1 | tail -20"
    safety_check: "scripts.safe[data-refresh]"

assertions:
  - type: "text_contains"
    target: "stdout"
    expected: "pass"
    description: "Test-Loop 新增 `unit-test` category，有 `unit-runner.sh` executor 可执行 `npm test` 并生成"
  - type: "text_contains"
    target: "stdout"
    expected: "pass"
    description: "Test-Loop SCAN 阶段能扫描 `conductor/tracks/*/spec.md` 的验收标准，发现未被已有测试覆盖的 gap"
  - type: "text_contains"
    target: "stdout"
    expected: "pass"
    description: "Test-Loop GENERATE 阶段能从 spec.md 验收标准生成测试定义 YAML，正确分类为 E2E/Interaction/Visual/API"
  - type: "text_contains"
    target: "stdout"
    expected: "pass"
    description: "Conductor:Verify 瘦身后不再包含自己的测试执行引擎，改为查询 `tests/results/` 已有结果"

timeout_seconds: 120
