# Agent Frontmatter Audit — 检查 agent 配置规范性
# 对应问题: agent 缺少必填字段导致静默回退为 general-purpose
# Probe 类型: audit (文件扫描 + 规则检查)

id: "agent-frontmatter-audit"
name: "Agent Frontmatter Audit"
category: "observability"
source: ".claude/agents/*.md"
description: "扫描所有 agent 定义文件，验证 frontmatter 必填字段和格式规范"
safety_level: "safe"
priority: "critical"
tags: ["observability", "audit", "agent-config"]

probe_type: "audit"
baseline_ref: "agent_config"

audit_config:
  scan_glob: ".claude/agents/*.md"
  rules:
    - field: "name"
      required: true
      description: "Agent 名称 — 缺失会导致 agent 不注册"
    - field: "description"
      required: true
      description: "Agent 描述 — 缺失会导致 agent 不注册"
    - field: "tools"
      format: "comma_separated_string"
      anti_pattern: '^\[.*\]$'
      description: "tools 必须是逗号分隔字符串，不能是 JSON 数组"

steps:
  - action: "scan_agent_files"
    params:
      glob: ".claude/agents/*.md"
  - action: "extract_frontmatter"
    params:
      fields: ["name", "description", "tools"]
  - action: "validate_rules"
    params:
      rules_ref: "audit_config.rules"

assertions:
  - type: "all_agents_have_name"
    expected: true
    description: "每个 agent 都有 name 字段"
  - type: "all_agents_have_description"
    expected: true
    description: "每个 agent 都有 description 字段"
  - type: "tools_format_correct"
    expected: "comma_separated"
    description: "tools 字段是逗号分隔字符串，不是 JSON 数组"
  - type: "agent_count_under_max"
    expected: "<=10"
    description: "agent 总数不超过 baselines.yaml 的 max_agents"

timeout_seconds: 30
