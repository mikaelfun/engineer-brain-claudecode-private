# Learnings Regression v2 — Infrastructure Fixes Verification
# 验证 6 条基础设施修复学习经验未复发
# 覆盖 learnings.yaml 中 round-1 以后新增的 infra 类经验

id: "learnings-regression-infra"
name: "Learnings Regression — Infrastructure Fixes (Round 4+)"
category: "observability"
source: "tests/learnings.yaml — observability-scanner gap"
description: "验证 timing-json 修复、local-outside-function、node-posix-path、state-json 原子写入、judge-field-paths、自愈 pattern-detector 等关键基础设施修复未复发"
safety_level: "safe"
priority: "medium"
tags: ["observability", "stability", "regression", "infra", "round-4"]

probe_type: "stability"
baseline_ref: "bash_stability"

stability_config:
  min_runs: 1
  min_success_rate: 1.0
  learnings_checks:
    - learning_id: "timing-json-stale-fallback"
      check_command: |
        grep -q "poll_start" tests/executors/common.sh && echo "PASS" || echo "FAIL:poll_start logic missing in common.sh"
      description: "poll_for_completion 使用 mtime >= poll_start 防止 stale fallback"

    - learning_id: "local-outside-function"
      check_command: |
        COUNT=$(grep -n "^local " tests/executors/e2e-runner.sh 2>/dev/null | grep -v "^[0-9]*:.*function\|^[0-9]*:[[:space:]]*local " | wc -l)
        [ "$COUNT" -eq 0 ] && echo "PASS" || echo "FAIL:$COUNT bare 'local' at line start in e2e-runner.sh"
      description: "e2e-runner.sh 中没有在函数外部使用 local 关键字"

    - learning_id: "node-posix-path"
      check_command: |
        grep -q "cygpath" tests/executors/e2e-runner.sh && echo "PASS" || echo "FAIL:cygpath not found in e2e-runner.sh"
      description: "e2e-runner.sh 使用 cygpath -w 处理 Windows 路径"

    - learning_id: "state-json-atomic-write"
      check_command: |
        [ -f "tests/executors/state-writer.sh" ] && echo "PASS" || echo "FAIL:state-writer.sh not found"
      description: "state-writer.sh 存在（原子写入工具）"

    - learning_id: "judge-field-paths"
      check_command: |
        FAIL=0
        for f in tests/registry/workflow-e2e/regression-judge-cache.yaml tests/registry/workflow-e2e/regression-days-contact.yaml; do
          if grep -q "judge\." "$f" 2>/dev/null; then
            FAIL=1
            echo "FAIL:$f still uses deprecated judge.xxx path"
          fi
        done
        [ "$FAIL" -eq 0 ] && echo "PASS" || true
      description: "regression test defs 使用顶级字段名（不是 judge.xxx 嵌套路径）"

    - learning_id: "auto-heal-20260328-1538"
      check_command: |
        [ -f "tests/executors/pattern-detector.sh" ] && [ -f "tests/executors/self-heal-recorder.sh" ] && echo "PASS" || echo "FAIL:pattern-detector.sh or self-heal-recorder.sh missing"
      description: "自愈基础设施文件存在（pattern-detector + self-heal-recorder）"

    - learning_id: "variable-pipe-gotcha"
      check_command: |
        FOUND=$(grep -rn "; [A-Z_]*=" tests/executors/*.sh 2>/dev/null | grep "|" | grep -v "^Binary\|#" | head -3)
        [ -z "$FOUND" ] && echo "PASS" || echo "FAIL:potential var+pipe anti-pattern: $FOUND"
      description: "executor 脚本中没有变量赋值+pipe 同行的反模式"

steps:
  - action: "load_learnings"
    params:
      file: "tests/learnings.yaml"
  - action: "run_learning_checks"
    params:
      checks_ref: "stability_config.learnings_checks"

assertions:
  - type: "all_learnings_valid"
    expected: true
    description: "所有 7 条基础设施 learning 的 solution 条件仍然成立"
  - type: "no_regression"
    expected: true
    description: "基础设施修复未复发"

timeout_seconds: 30
