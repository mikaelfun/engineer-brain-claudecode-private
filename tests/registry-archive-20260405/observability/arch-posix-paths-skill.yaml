# Test: POSIX Paths in Skills Architecture Compliance
# Generated: Round 30 | Source: arch-scan (CLAUDE.md architecture requirement)
# Recipe: none

id: "arch-posix-paths-skill"
name: "POSIX Paths in Skills Architecture Compliance"
category: "observability"
probe_type: "audit"
source: "arch-scan"
safety_level: "safe"
description: "Verify all skills use POSIX path format (/c/...) not Windows paths (C:\... or C:/) in Bash commands per Git Bash MSYS2 requirement"

steps:
  - action: "validate"
    params:
      description: "Scan all SKILL.md files for Windows path anti-patterns in Bash code blocks"

assertions:
  - type: "grep_not_match"
    target: ".claude/skills/*/SKILL.md"
    pattern: '```bash.*[A-Z]:\\.*```'
    description: "No backslash Windows paths (C:\\...) in bash code blocks"

  - type: "grep_not_match"
    target: ".claude/skills/*/SKILL.md"
    pattern: '```bash.*[A-Z]:/.*```'
    description: "No forward-slash Windows paths (C:/..) in bash code blocks"

  - type: "grep_match_all_or_none"
    target: ".claude/skills/*/SKILL.md"
    pattern: '```bash.*\/c\/Users\/.*```'
    description: "Any full paths in bash blocks must use POSIX format (/c/...)"

metadata:
  generatedAt: "2026-03-31T09:30:00.000Z"
  round: 30
  gapId: "arch-posix-paths-skill"
