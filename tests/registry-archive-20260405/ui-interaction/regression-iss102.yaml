id: "regression-iss102"
name: "Regression: ISS-102 — Dashboard UX Fix"
category: "ui-interaction"
source: "issues/ISS-102.json"
description: "回归测试：验证 ISS-102 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-102"]
regression_for: "ISS-102"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "每个 case 的每种操作类型最多一个活跃 session，UI 即时禁用已触发按钮"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "操作触发后有实时步骤级进度显示（SSE 驱动）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "页面刷新后能从后端恢复活跃 session 状态和历史消息"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Case 标题完整显示或有 tooltip"

timeout_seconds: 60
