id: "regression-iss087"
name: "Regression: ISS-087 — Full Process 点击后只显示 started 消息，Agent Monitor 无消息流"
category: "ui-interaction"
source: "issues/ISS-087.json"
description: "回归测试：验证 ISS-087 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-087"]
regression_for: "ISS-087"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "full-process 和 step 的消息格式一致（都使用语义化消息：tool-call、thinking、tool-result）"

timeout_seconds: 60
