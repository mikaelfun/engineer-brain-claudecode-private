id: "regression-iss028"
name: "Regression: ISS-028 — Dashboard 设计系统集成 — 暗色/亮色双主题 + CSS 变量 + 全组件改造"
category: "ui-interaction"
source: "issues/ISS-028.json"
description: "回归测试：验证 ISS-028 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-028"]
regression_for: "ISS-028"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "默认暗色主题，`<html class='dark'>` 激活"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "主题切换按钮（侧边栏底部），支持 dark/light/system 三种模式"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "主题偏好持久化到 localStorage"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "所有页面和组件正确渲染暗色和亮色主题"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "CSS 变量系统完整实现（`--bg-base`、`--text-primary`、`--accent-*` 等）"

timeout_seconds: 60
