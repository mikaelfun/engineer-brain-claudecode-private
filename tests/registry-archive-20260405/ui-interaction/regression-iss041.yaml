id: "regression-iss041"
name: "Regression: ISS-041 — Done Issue 展示实现状态和验证状态（人工/自动、每项结果）"
category: "ui-interaction"
source: "issues/ISS-041.json"
description: "回归测试：验证 ISS-041 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-041"]
regression_for: "ISS-041"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Auto-Verified 徽章显示总体结果颜色（全通过=绿色，部分失败=红色）"

timeout_seconds: 60
