id: "regression-iss082"
name: "Regression: ISS-082 — 执行 status-judge step 时 session 不显示在 active session 和 agent m"
category: "ui-interaction"
source: "issues/ISS-082.json"
description: "回归测试：验证 ISS-082 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-082"]
regression_for: "ISS-082"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Session shows correct status (active → completed lifecycle visible)"

timeout_seconds: 60
