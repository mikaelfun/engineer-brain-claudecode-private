id: "regression-iss026"
name: "Regression: ISS-026 — WebUI Issues 第二页没有被正确分类到三个模块"
category: "ui-interaction"
source: "issues/ISS-026.json"
description: "回归测试：验证 ISS-026 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-026"]
regression_for: "ISS-026"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "分组在分页之前执行（即分组看到的是全量数据，不受分页影响）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "当 issues 数量多时，仍有分页机制避免页面过长（客户端分页）"

timeout_seconds: 60
