id: "regression-iss090"
name: "Regression: ISS-090 — AI Assistant 中 Full Process 的 SSE 消息没有中间过程，只有结果消息"
category: "ui-interaction"
source: "issues/ISS-090.json"
description: "回归测试：验证 ISS-090 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-090"]
regression_for: "ISS-090"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "`case-step-progress` 监听器在收到 sessionId 且当前无 activeSession 时自动设置"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Full Process 执行时 AI Assistant 面板实时显示 tool 调用和 thinking 消息"

timeout_seconds: 60
