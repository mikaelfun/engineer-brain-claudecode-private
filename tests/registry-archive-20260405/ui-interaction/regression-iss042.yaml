id: "regression-iss042"
name: "Regression: ISS-042 — implemented状态issue应该详细页能展示相关测试计划"
category: "ui-interaction"
source: "issues/ISS-042.json"
description: "回归测试：验证 ISS-042 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-042"]
regression_for: "ISS-042"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Plan 面板除 Task 列表外，额外展示 Verification 检查项（来自各 Phase 的 `### Verification` 小节）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Plan 面板展示 Post-Implementation Checklist（来自 `## Post-Implementation Checklist` 小节"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "检查项显示 ✅/⬜ 状态（对应 `[x]` / `[ ]`）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Verification 和 Checklist 区域视觉上与 Task 列表区分（如小标题或分隔线）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "对无 verification 内容的 plan 保持现有展示不变"

timeout_seconds: 60
