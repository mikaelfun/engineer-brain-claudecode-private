id: "regression-iss101"
name: "Regression: ISS-101 — 增加 /conductor:verify 命令，对齐 WebUI verify 按钮逻辑"
category: "ui-interaction"
source: "issues/ISS-101.json"
description: "回归测试：验证 ISS-101 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-101"]
regression_for: "ISS-101"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "`/conductor:verify [trackId"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "`/conductor:verify --mark-done [trackId"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "`/conductor:verify --reopen [trackId"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "前置检查：track.status 必须是 complete/completed 才允许 verify/mark-done"

timeout_seconds: 60
