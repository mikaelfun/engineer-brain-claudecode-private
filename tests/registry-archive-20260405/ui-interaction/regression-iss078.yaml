id: "regression-iss078"
name: "Regression: ISS-078 — AI Assistant 交互和展示逻辑需要重新设计"
category: "ui-interaction"
source: "issues/ISS-078.json"
description: "回归测试：验证 ISS-078 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-078"]
regression_for: "ISS-078"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "后端新建 `case-step-state.ts`，参考 `issue-track-state.ts`，支持 messages/isActive/pending"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "后端 `steps.ts` 添加 AskUserQuestion 拦截 → 发送 `case-step-question` SSE 事件"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "后端新增 `POST /case/:id/step-answer` 路由，接收用户回答并 resume session"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "前端新建 `caseAssistantStore.ts`，包含 messages/status/pendingQuestion per caseNumber"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "前端 `useSSE.ts` 添加 `case-step-question` 事件处理"

timeout_seconds: 60
