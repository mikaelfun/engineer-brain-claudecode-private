id: iss-192-copy-html-draft
name: "ISS-192: Draft Copy Button — HTML Rich Text + Plain Text Fallback"
category: ui-interaction
source: "issues/ISS-192.json (AC: Copy button copies HTML rich text)"
safety_level: safe
recipe_used: issue-driven-ui.md
issueId: ISS-192
priority: P1
data_source: live
description: >
  Verifies that the Copy button on DraftCard copies both text/html (for Outlook rich paste)
  and text/plain (for Ctrl+Shift+V plain paste) to the clipboard. Tests in both
  CaseDetail DraftCard and DraftsPage DraftCard contexts.

steps:
  - action: navigate
    params:
      url: "http://localhost:5173"
      description: "Open Dashboard"
  - action: navigate_to_case
    params:
      caseId: "{live_case_id}"
  - action: click
    params:
      selector: "[data-testid='draft-copy-btn']"
      description: "Click Copy button on first draft card"
  - action: read_clipboard
    params:
      mimeTypes: ["text/html", "text/plain"]
      description: "Read clipboard contents for both MIME types"

assertions:
  - type: clipboard_has_mime
    expected: "text/html"
    description: "Clipboard contains text/html MIME type"
  - type: clipboard_has_mime
    expected: "text/plain"
    description: "Clipboard contains text/plain fallback"
  - type: clipboard_html_not_empty
    description: "HTML clipboard content is non-empty"
  - type: clipboard_plain_not_empty
    description: "Plain text clipboard content is non-empty"

tags: [clipboard, draft, copy, ISS-192]
createdAt: "2026-04-01"
createdByCycle: 42
