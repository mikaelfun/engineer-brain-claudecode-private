id: "regression-iss055"
name: "Regression: ISS-055 — Issues页面与Agent Monitor状态不同步：Agent Monitor显示ISS-045有active tr"
category: "ui-interaction"
source: "issues/ISS-055.json"
description: "回归测试：验证 ISS-055 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-055"]
regression_for: "ISS-055"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "TrackProgressPanel renders and recovers messages for issues with active backend "
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Existing SSE-driven flow continues to work unchanged"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "AgentMonitor.test.tsx continues to pass"

timeout_seconds: 60
