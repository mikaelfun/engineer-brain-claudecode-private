id: "regression-iss053"
name: "Regression: ISS-053 — Agent Monitor展开session看到的实时状态消息被截断，不完整"
category: "ui-interaction"
source: "issues/ISS-053.json"
description: "回归测试：验证 ISS-053 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-053"]
regression_for: "ISS-053"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "MessageBubble 正常模式：默认展示较长预览（如 500 字符），超出部分可点击展开查看全文"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "MessageBubble compact 模式（collapsed group 内部）：展开后显示完整内容"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Collapsed thinking preview 保持 60 字符预览（这是 collapsed 状态，合理）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "展开/收起状态切换流畅，不影响滚动行为"

timeout_seconds: 60
