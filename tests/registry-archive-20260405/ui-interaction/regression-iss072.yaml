id: "regression-iss072"
name: "Regression: ISS-072 — Create Track 的 INPUT REQUIRED 卡片应显示 specification 内容，而非仅在 SS"
category: "ui-interaction"
source: "issues/ISS-072.json"
description: "回归测试：验证 ISS-072 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-072"]
regression_for: "ISS-072"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "INPUT REQUIRED 卡片内显示 specification/plan 上下文内容（amber 左边框预览块）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "修复 `contextContent` 提取逻辑，使其跳过 `tool-call` 消息"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "不影响已有的 thinking 消息折叠和显示逻辑"

timeout_seconds: 60
