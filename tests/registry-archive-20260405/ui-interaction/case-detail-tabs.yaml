id: "ui-case-detail-tabs"
name: "Case Detail — Tab 切换 + 数据加载"
category: "ui-interaction"
source: "playbooks/guides/casework-evolution-loop.md — Scenario G Step 2"
description: "验证 Case 详情页的 Tab 切换、数据加载、AI Panel 交互"
safety_level: "safe"
priority: "high"
tags: ["evolution-loop", "scenario-g", "ui"]

test_case_id: "2603090040000814"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}/case/{test_case_id}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "case header"
      expected: "contains case number"
  - action: "click"
    params:
      target: "Inspection tab"
    safety_check: "ui.safe[click_tab]"
  - action: "verify_element"
    params:
      selector: "case-summary content"
      expected: "visible"
  - action: "click"
    params:
      target: "Emails tab"
    safety_check: "ui.safe[click_tab]"
  - action: "verify_element"
    params:
      selector: "email list"
      expected: "visible"
  - action: "click"
    params:
      target: "Todo tab"
    safety_check: "ui.safe[click_tab]"
  - action: "verify_element"
    params:
      selector: "todo list"
      expected: "visible"
  - action: "click"
    params:
      target: "AI Assistant tab"
    safety_check: "ui.safe[click_tab]"
  - action: "verify_element"
    params:
      selector: "ai panel"
      expected: "visible"

assertions:
  - type: "element_visible"
    target: "case header with case number"
    expected: true
  - type: "element_text"
    target: "case header"
    expected: "contains {test_case_id}"

timeout_seconds: 60
