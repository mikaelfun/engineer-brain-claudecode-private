id: "ui-step-filter-tabs"
name: "UI Interaction: Step Filter Tabs — 步骤过滤 Tab"
category: "ui-interaction"
source: "dashboard/web/src/components/common/StepFilterTabs.tsx"
description: "验证 StepFilterTabs 组件：Agent Monitor session 详情页中，步骤过滤 Tab 可正常渲染，点击切换有响应"
safety_level: "safe"
priority: "low"
tags: ["ui", "interaction", "step-filter", "agent-monitor", "round-10"]

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}/agents"
    safety_check: "ui.safe[navigate_to_page]"

  - action: "verify_element"
    params:
      selector: "main"
      expected: "visible"
      timeout: 5000

  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-step-filter-tabs-agents.jpg"

  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"

assertions:
  - type: "no_console_errors"
    description: "Step Filter Tabs 渲染无 JS 错误"
  - type: "element_not_present"
    selector: ".error-boundary-fallback"
    description: "无 error boundary 触发"
