id: "ux-no-empty-state"
name: "Layout Empty State — List pages show appropriate empty state message"
category: "ui-interaction"
source: "ux-scan"
description: "Verify that list pages (Cases, Drafts, Layout) show empty state UI when no items exist"
safety_level: "safe"
priority: "P3"
tags: ["ux", "empty-state", "cycle-41"]

steps:
  - action: "browser_navigate"
    params:
      url: "http://localhost:5173/layout"
  - action: "browser_evaluate"
    params:
      function: "() => { const content = document.body.textContent; return content.includes('No') || content.includes('Empty') || content.includes('列表为空') || content.length < 200 ? 'has-empty-state' : 'no-empty-state'; }"
    safety_check: "playwright.safe[browser_evaluate]"

assertions:
  - type: "text_contains"
    target: "evaluate_result"
    expected: "has-empty-state"
    description: "Empty state indicator exists when list is empty"

timeout_seconds: 30
