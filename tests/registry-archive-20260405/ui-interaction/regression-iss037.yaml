id: "regression-iss037"
name: "Regression: ISS-037 — 点击verify目前弹出独立窗口显示实时状态，应该参照create track在内部展示"
category: "ui-interaction"
source: "issues/ISS-037.json"
description: "回归测试：验证 ISS-037 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-037"]
regression_for: "ISS-037"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "移除全屏 loading overlay 和结果 modal"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "测试结果（pass/fail + output）在 inline panel 内展示"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "verify 执行中不可重复点击"

timeout_seconds: 60
