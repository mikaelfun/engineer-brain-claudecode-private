id: "regression-iss108"
name: "Regression: ISS-108 — Agent Monitor Step-Grouped Message Display"
category: "ui-interaction"
source: "issues/ISS-108.json"
description: "回归测试：验证 ISS-108 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-108"]
regression_for: "ISS-108"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "每个 step 组有 header（step 名称 + 状态标识：running/completed/failed）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "无 step 标记的消息归入一个通用分组"

timeout_seconds: 60
