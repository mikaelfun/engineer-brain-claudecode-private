  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "tracking 状态下按钮禁用（防重复点击）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "TypeScript 前后端编译通过"
  - type: "text_contains"
    target: "page"
    expected: "visible"
