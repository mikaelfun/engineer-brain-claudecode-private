id: "ui-session-panel"
name: "UI Interaction: Case Session Panel — 会话列表与消息查看"
category: "ui-interaction"
source: "dashboard/web/src/components/CaseSessionPanel.tsx"
description: "验证 Case Detail 页面的 Session Panel：导航至 case 详情页，验证 Session Panel 入口存在，检查会话列表加载"
safety_level: "safe"
priority: "medium"
tags: ["ui", "interaction", "session-panel", "case-detail", "round-8"]

steps:
  # Step 1: 导航至 Dashboard
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"

  # Step 2: 导航至 Cases 列表
  - action: "click"
    params:
      target: "Cases nav item"
    safety_check: "ui.safe[click_sidebar_nav]"

  # Step 3: 验证 case 列表
  - action: "verify_element"
    params:
      selector: "table tbody tr:first-child, [class*='case-row']:first-child"
      expected: "visible"
      timeout: 5000

  # Step 4: 点击第一个 case
  - action: "click"
    params:
      target: "first case row"
      selector: "table tbody tr:first-child, [class*='case-row']:first-child"
    safety_check: "ui.safe[click_table_row]"

  # Step 5: 验证 case 详情页
  - action: "verify_element"
    params:
      selector: "main, [class*='case-detail']"
      expected: "visible"
      timeout: 5000

  # Step 6: 寻找 Session Panel 入口
  - action: "check_element"
    params:
      selector: "[data-testid='session-panel'], [class*='session-panel'], [class*='CaseSessionPanel'], button[aria-label*='Session'], [role='tab']:has-text('Session')"
      timeout: 3000
      optional: true

  # Step 7: 截图
  - action: "screenshot"
    params:
      selector: "body"
      filename: "ui-session-panel.jpg"

assertions:
  - type: "element_visible"
    target: "case detail main content"
    expected: true
    description: "Case 详情页主内容区域可见"

  - type: "page_load"
    target: "/cases/"
    expected: "loaded"
    description: "Case 详情页加载成功"

  - type: "no_console_errors"
    target: "page"
    description: "页面无严重控制台错误"

timeout_seconds: 45
