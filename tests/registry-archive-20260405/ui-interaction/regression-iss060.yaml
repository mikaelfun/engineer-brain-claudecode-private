id: "regression-iss060"
name: "Regression: ISS-060 — Case 列表显示 Refresh 时间、Teams 消息截止时间、Refresh/Full Process 按钮"
category: "ui-interaction"
source: "issues/ISS-060.json"
description: "回归测试：验证 ISS-060 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-060"]
regression_for: "ISS-060"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Case 列表每个 card 显示 fetchedAt 时间（相对时间格式，如 '5m ago'）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "后端 GET /api/cases 返回扩展的 CaseSummary 包含 fetchedAt 和 teamsLastMessageTime"

timeout_seconds: 60
