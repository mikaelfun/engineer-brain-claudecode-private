id: df-msg-truncate
name: "Design Fidelity: MessageBubble truncation at 500 chars with expand"
category: ui-interaction
source: design-fidelity
description: "验证 session-msg-truncate spec AC: 默认展示500字符，超出可展开"
safety_level: safe
priority: high
tags: ["design-fidelity", "session-msg-truncate_20260321"]
recipe_used: design-fidelity-test.md
data_source: live
live_pool: data_rich
steps:
  - action: playwright_navigate
    params:
      url: "http://localhost:5173/cases/{caseId}"
  - action: playwright_evaluate
    params:
      expression: "document.querySelectorAll('.message-bubble, [data-testid=message], .session-message').length"
assertions:
  - type: element_visible
    target: ".message-bubble, [data-testid='message'], .session-message"
    expected: true
timeout_seconds: 90