id: iss-192-edit-save-draft
name: "ISS-192: Draft Edit/Save/Cancel Inline Markdown Editor"
category: ui-interaction
source: "issues/ISS-192.json (AC: Edit toggles inline editor, Save persists, Cancel discards)"
safety_level: safe
recipe_used: issue-driven-ui.md
issueId: ISS-192
priority: P1
data_source: live
description: >
  Verifies Edit button toggles inline markdown textarea, Save persists to disk via API,
  Cancel discards edits and returns to rendered view. Also verifies Copy after edit
  uses the modified content.

steps:
  - action: navigate
    params:
      url: "http://localhost:5173"
  - action: navigate_to_case
    params:
      caseId: "{live_case_id}"
  - action: get_draft_content
    params:
      selector: "[data-testid='draft-card']:first-child [data-testid='draft-rendered']"
      description: "Capture original rendered content"
  - action: click
    params:
      selector: "[data-testid='draft-edit-btn']"
      description: "Click Edit button"
  - action: assert_visible
    params:
      selector: "[data-testid='draft-editor-textarea']"
      description: "Inline textarea editor appears"
  - action: type
    params:
      selector: "[data-testid='draft-editor-textarea']"
      text: "\n\n<!-- test edit -->"
      append: true
  - action: click
    params:
      selector: "[data-testid='draft-save-btn']"
      description: "Click Save"
  - action: wait_for_hidden
    params:
      selector: "[data-testid='draft-editor-textarea']"
  - action: reload_page
    params: {}
  - action: get_draft_content
    params:
      selector: "[data-testid='draft-card']:first-child [data-testid='draft-rendered']"
      description: "Check content persisted after reload"

assertions:
  - type: element_visible
    selector: "[data-testid='draft-editor-textarea']"
    when: after_edit_click
    description: "Textarea editor visible after Edit click"
  - type: element_hidden
    selector: "[data-testid='draft-editor-textarea']"
    when: after_save
    description: "Textarea hidden after Save"
  - type: text_contains
    selector: "[data-testid='draft-card']:first-child"
    expected: "<!-- test edit -->"
    when: after_reload
    description: "Edited content persists after page reload"

tags: [edit, save, cancel, draft, inline-editor, ISS-192]
createdAt: "2026-04-01"
createdByCycle: 42
