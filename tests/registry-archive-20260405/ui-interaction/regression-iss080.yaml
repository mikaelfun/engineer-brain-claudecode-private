id: "regression-iss080"
name: "Regression: ISS-080 — Agent Monitor 里 session 点开后没有 SSE"
category: "ui-interaction"
source: "issues/ISS-080.json"
description: "回归测试：验证 ISS-080 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-080"]
regression_for: "ISS-080"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "CaseSessionDetail 从 `sessionMessages[caseNumber:sessionId]` 读取消息"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "回退兼容：如果 sessionId 不可用，fallback 到 case-level messages"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "消息恢复（recovery）也按 session 维度工作"

timeout_seconds: 60
