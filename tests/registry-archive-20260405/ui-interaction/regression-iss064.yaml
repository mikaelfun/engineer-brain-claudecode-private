id: "regression-iss064"
name: "Regression: ISS-064 — Todo 错误生成 "修改 SAP: Status → Problem Solved" — SAP 与 Status 无"
category: "ui-interaction"
source: "issues/ISS-064.json"
description: "回归测试：验证 ISS-064 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-064"]
regression_for: "ISS-064"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "inspection-writer SKILL.md 中明确定义 SAP = Support Area Path，并列出 SAP 修改的唯一场景"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "todo-format.md 中的 SAP 模板添加注释说明 SAP 只适用于 Support Area Path"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "添加负面示例：Status 变更 ≠ SAP 修改"

timeout_seconds: 60
