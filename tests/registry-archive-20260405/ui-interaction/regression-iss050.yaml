id: "regression-iss050"
name: "Regression: ISS-050 — Creating Track 实时过程中应有取消按钮"
category: "ui-interaction"
source: "issues/ISS-050.json"
description: "回归测试：验证 ISS-050 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-050"]
regression_for: "ISS-050"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Cancel button hidden after completion/error or when a question is pending"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Clicking Cancel calls backend endpoint to stop tracking + reset issue to pending"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Backend sets a cancellation flag so the running agent's output is discarded"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "SSE broadcasts cancellation event to update all connected clients"

timeout_seconds: 60
