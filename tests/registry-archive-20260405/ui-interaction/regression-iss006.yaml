id: "regression-iss006"
name: "Regression: ISS-006 — Dashboard Issue Tracker 入口"
category: "ui-interaction"
source: "issues/ISS-006.json"
description: "回归测试：验证 ISS-006 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-006"]
regression_for: "ISS-006"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "支持创建 issue：标题 + 描述 + 类型（bug/feature/refactor/chore）+ 优先级（P0/P1/P2）"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Issue 列表分页显示，支持按状态筛选（pending/tracked/in-progress/done）"

timeout_seconds: 60
