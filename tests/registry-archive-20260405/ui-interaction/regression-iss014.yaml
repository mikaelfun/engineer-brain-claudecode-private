id: "regression-iss014"
name: "Regression: ISS-014 — webui issues页面把done, tracked, pending三种类型分开放，支持折叠"
category: "ui-interaction"
source: "issues/ISS-014.json"
description: "回归测试：验证 ISS-014 实现的功能未退化"
safety_level: "safe"
priority: "medium"
tags: ["regression", "issue-driven", "iss-014"]
regression_for: "ISS-014"

steps:
  - action: "navigate"
    params:
      url: "{frontend_url}"
    safety_check: "ui.safe[navigate_to_page]"
  - action: "verify_element"
    params:
      selector: "body"
      expected: "visible"
      timeout: 5000

assertions:
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "每组有标题栏 + issue 数量 + 折叠/展开按钮"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "Done 组默认折叠，其余默认展开"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "折叠后只显示标题栏，展开后显示所有 issue 行"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "空组不显示"
  - type: "text_contains"
    target: "page"
    expected: "visible"
    description: "原有 Filter（type/status）仍然可用"

timeout_seconds: 60
