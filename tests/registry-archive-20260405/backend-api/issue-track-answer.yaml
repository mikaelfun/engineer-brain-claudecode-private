id: "issue-track-answer"
name: "Issue Track Answer Endpoint — POST /api/issues/:id/track-answer"
category: "backend-api"
source: "dashboard/src/routes/issues.ts"
description: "验证 track-answer 端点行为：缺少 answer 返回 400，无 pending 问题返回 404"
safety_level: "safe"
priority: "medium"
tags: ["api", "issues", "track", "answer", "round-13"]

steps:
  # Step 1: POST without answer body — expect 400
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues/ISS-001/track-answer"
      auth: true
      body: {}
      expected_status: [400]
    safety_check: "api.safe[POST /api/issues/:id/track-answer]"

  # Step 2: POST with empty answer string — expect 400
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues/ISS-001/track-answer"
      auth: true
      body:
        answer: ""
      expected_status: [400]
    safety_check: "api.safe[POST /api/issues/:id/track-answer]"

  # Step 3: POST with valid answer but no pending question — expect 404
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues/ISS-001/track-answer"
      auth: true
      body:
        answer: "test answer"
      expected_status: [404]
    safety_check: "api.safe[POST /api/issues/:id/track-answer]"

  # Step 4: POST to non-existent issue — expect 404
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/issues/ISS-NONEXISTENT/track-answer"
      auth: true
      body:
        answer: "test answer"
      expected_status: [404]
    safety_check: "api.safe[POST /api/issues/:id/track-answer]"

assertions:
  - type: "status_code"
    target: "POST /api/issues/:id/track-answer (missing answer)"
    expected: [400]
    description: "缺少 answer 字段返回 400"

  - type: "json_field"
    target: "step1.body.error"
    expected: "not null"
    description: "400 响应包含 error 字段"

  - type: "status_code"
    target: "POST /api/issues/:id/track-answer (empty answer)"
    expected: [400]
    description: "空 answer 字符串返回 400"

  - type: "status_code"
    target: "POST /api/issues/:id/track-answer (no pending question)"
    expected: [404]
    description: "无 pending 问题时返回 404"

  - type: "json_field"
    target: "step3.body.error"
    expected: "not null"
    description: "404 响应包含 error 字段"
