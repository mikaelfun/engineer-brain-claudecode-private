id: "patrol-cancel-session-ops"
name: "Patrol Cancel + Session End-All Endpoints"
category: "backend-api"
source: "dashboard/src/routes/case-routes.ts — POST /patrol/cancel, POST /case/:id/session/end-all"
description: "验证 POST /patrol/cancel（停止 patrol）和 POST /case/:id/session/end-all（清理 case 会话）端点基本响应"
safety_level: "safe"
priority: "medium"
tags: ["api", "patrol", "sessions", "ops", "round-5"]

steps:
  # Step 1: GET patrol/status first to confirm state
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/patrol/status"
      auth: true
      expected_status: [200]
    safety_check: "api.safe[GET /api/patrol/status]"

  # Step 2: POST patrol/cancel — if no patrol running, expect 404 or 400
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/patrol/cancel"
      auth: true
      expected_status: [200, 404, 400]
    safety_check: "api.safe[POST /api/patrol]"

  # Step 3: GET /api/cases to find a valid case ID to test session/end-all
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/cases"
      auth: true
      expected_status: [200]
    safety_check: "api.safe[GET /api/cases]"

  # Step 4: POST /case/:id/session/end-all on first available case
  # Even if no sessions exist, should return 200 (idempotent)
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/case/{first_case_id}/session/end-all"
      auth: true
      expected_status: [200, 404]
    safety_check: "api.safe[POST /api/case/:id/process]"

  # Step 5: GET /api/operations/active — verify no orphan operations
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/operations/active"
      auth: true
      expected_status: [200]
    safety_check: "api.safe[GET /api/operations/active]"

assertions:
  - type: "status_code"
    target: "GET /api/patrol/status"
    expected: 200
    description: "patrol/status 端点可访问"

  - type: "json_field"
    target: "GET /api/patrol/status"
    field: "running"
    description: "patrol/status 返回 running 字段（boolean）— API 实际字段名为 running 而非 status"

  - type: "status_code"
    target: "POST /api/patrol/cancel"
    expected: [200, 404, 400]
    description: "patrol/cancel 在无 patrol 时返回有效状态码"

  - type: "status_code"
    target: "GET /api/cases"
    expected: 200
    description: "cases 列表可访问"

  - type: "status_code"
    target: "POST /api/case/:id/session/end-all"
    expected: [200, 404]
    description: "session/end-all 端点返回有效状态码"

timeout_seconds: 30
