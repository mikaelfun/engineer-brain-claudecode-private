id: "settings-validate"
name: "Settings API — GET + PUT + validate-path"
category: "backend-api"
source: "dashboard/src/routes/case-routes.ts"
description: "验证 settings 端点: GET 读取配置, PUT 写入, validate-path 路径校验"
safety_level: "safe"
priority: "medium"
tags: ["api", "settings", "round-3"]

steps:
  - action: "http_request"
    params:
      method: "GET"
      url: "{api_base}/api/settings"
      auth: true
    safety_check: "api.safe[GET /api/settings]"
  - action: "http_request"
    params:
      method: "POST"
      url: "{api_base}/api/settings/validate-path"
      auth: true
      body: '{"path":"C:\\Users\\fangkun\\Documents\\Claude Code Projects\\EngineerBrain\\cases"}'
    safety_check: "api.safe[PATCH /api/settings/validate-path]"

assertions:
  - type: "status_code"
    target: "GET /api/settings"
    expected: 200
  - type: "json_field"
    target: "GET /api/settings"
    field: "casesRoot"
    expected_type: "string"
  - type: "status_code"
    target: "POST /api/settings/validate-path"
    expected: 200

timeout_seconds: 30
