# Test Safety Manifest
# 结构化安全规则 — 测试执行前必须查表确认
# Source: playbooks/rules/test-safety-redlines.md + CLAUDE.md
# 规则: SAFE → 自动执行, BLOCKED → 自动跳过并记录 reason, REVIEW → 标记 warning

# ============================================================
# D365 脚本操作
# ============================================================
scripts:
  safe:
    - action: "casework"
      reason: "全程只读 D365 API + 生成本地文件"
    - action: "data-refresh"
      reason: "D365 读操作"
    - action: "compliance-check"
      reason: "D365 读操作"
    - action: "status-judge"
      reason: "本地文件操作"
    - action: "inspection-writer"
      reason: "生成 case-summary + todo，本地文件操作"
    - action: "troubleshooter"
      reason: "Kusto 只读 + msft-learn 只读"
    - action: "draft-email"
      reason: "只写本地文件，不发送邮件"
    - action: "patrol"
      reason: "等同于批量 casework，只是耗时较长"
    - action: "teams-search"
      reason: "Teams API 只读"

  blocked:
    - action: "add-note.ps1"
      reason: "D365 写入 — 创建 Case Note"
    - action: "add-phone-call.ps1"
      reason: "D365 写入 — 创建 Phone Call 活动"
    - action: "record-labor.ps1"
      reason: "D365 写入 — 记录 Labor"
    - action: "edit-sap.ps1"
      reason: "D365 写入 — 修改 Support Area Path"
    - action: "new-email.ps1"
      reason: "D365 写入 — 创建邮件草稿"
    - action: "reply-email.ps1"
      reason: "D365 写入 — 回复邮件草稿"
    - action: "edit-draft.ps1"
      reason: "D365 写入 — 修改邮件草稿"
    - action: "delete-draft.ps1"
      reason: "D365 删除 — 删除邮件草稿"
    - action: "request-access.ps1"
      reason: "D365 写入 — 请求 Case 访问权限"

# ============================================================
# API 端点
# ============================================================
api:
  safe:
    # 读操作
    - action: "GET /api/health"
      reason: "健康检查"
    - action: "GET /api/cases"
      reason: "读操作 — 列出 cases"
    - action: "GET /api/cases/:id"
      reason: "读操作 — 单个 case 详情"
    - action: "GET /api/cases/:id/meta"
      reason: "读操作 — meta.json"
    - action: "GET /api/cases/:id/emails"
      reason: "读操作 — emails.md"
    - action: "GET /api/cases/:id/notes"
      reason: "读操作 — notes.md"
    - action: "GET /api/cases/:id/todo"
      reason: "读操作 — 最新 todo"
    - action: "GET /api/cases/:id/inspection"
      reason: "读操作 — case-summary"
    - action: "GET /api/cases/:id/timing"
      reason: "读操作 — timing.json"
    - action: "GET /api/cases/stats"
      reason: "读操作 — 统计信息"
    - action: "GET /api/case/:id/step"
      reason: "读操作 — 可用步骤列表"
    - action: "GET /api/case/:id/step-progress"
      reason: "读操作 — 步骤执行进度"
    - action: "GET /api/case/:id/operation"
      reason: "读操作 — 活跃操作锁"
    - action: "GET /api/settings"
      reason: "读操作 — 用户配置"
    - action: "GET /api/todos"
      reason: "读操作 — 所有 todos"
    - action: "GET /api/todos/all"
      reason: "读操作 — 批量 todos"
    - action: "GET /api/sessions"
      reason: "读操作 — 活跃 sessions"
    - action: "GET /api/operations/active"
      reason: "读操作 — 活跃操作"
    - action: "GET /api/patrol/status"
      reason: "读操作 — patrol 状态"
    - action: "GET /api/issues"
      reason: "读操作 — 所有 issues"
    - action: "GET /api/drafts"
      reason: "读操作 — 邮件草稿列表"
    - action: "GET /api/logs"
      reason: "读操作 — 执行日志"
    - action: "GET /api/attachments"
      reason: "读操作 — 附件列表"
    - action: "GET /api/analysis"
      reason: "读操作 — 分析报告"
    - action: "GET /api/teams"
      reason: "读操作 — Teams 聊天内容"
    # 写操作（本地安全）
    - action: "PUT /api/settings"
      reason: "本地配置写入"
    - action: "PATCH /api/cases/:id/todo/toggle"
      reason: "本地文件勾选"
    - action: "POST /api/case/:id/process"
      reason: "触发 casework 只读流程"
    - action: "POST /api/case/:id/step/*"
      reason: "单步执行（除 todo execute 外都安全）"
    - action: "POST /api/patrol"
      reason: "批量巡检（耗时长，安全）"
    - action: "POST /api/issues"
      reason: "创建 Issue — 本地文件"
    - action: "PUT /api/issues/:id"
      reason: "更新 Issue — 本地文件"
    - action: "DELETE /api/issues/:id"
      reason: "删除 Issue — 本地文件"
    - action: "PATCH /api/settings/validate-path"
      reason: "验证路径 — 只读检查"

  blocked:
    - action: "POST /api/todo/:id/execute"
      reason: "直接执行 D365 写操作"

# ============================================================
# UI 操作（Playwright）
# ============================================================
ui:
  safe:
    # 导航
    - action: "navigate_to_page"
      reason: "页面导航 — 只读"
    - action: "click_sidebar_nav"
      reason: "侧边栏导航切换"
    - action: "click_tab"
      reason: "Tab 切换 — 只读"
    - action: "click_breadcrumb"
      reason: "面包屑导航"
    - action: "scroll_page"
      reason: "页面滚动"
    # 交互
    - action: "click_button"
      reason: "通用按钮点击（需检查不在 blocked 列表）"
    - action: "fill_input"
      reason: "输入框填写"
    - action: "fill_search_box"
      reason: "搜索框填写"
    - action: "toggle_checkbox"
      reason: "勾选框切换"
    - action: "select_dropdown"
      reason: "下拉选择"
    - action: "click_refresh"
      reason: "刷新按钮"
    # 视觉
    - action: "switch_theme"
      reason: "主题切换 — 本地状态"
    - action: "resize_window"
      reason: "窗口大小调整"
    - action: "take_screenshot"
      reason: "截图 — 只读"
    - action: "verify_element_exists"
      reason: "元素存在性检查"
    - action: "verify_text_content"
      reason: "文本内容验证"
    - action: "verify_layout"
      reason: "布局验证"
    # 工作流操作（非 D365 写）
    - action: "click_full_process"
      reason: "触发只读 casework 流程"
    - action: "click_single_step"
      reason: "触发单步执行（非 todo execute）"
    - action: "click_troubleshoot"
      reason: "触发 troubleshooter — 只读"
    - action: "click_draft_email"
      reason: "触发邮件草稿生成 — 本地文件"
    - action: "monitor_sse_progress"
      reason: "监听 SSE 进度更新"
    - action: "click_cancel_operation"
      reason: "取消操作"
    - action: "click_patrol"
      reason: "触发 patrol — 批量只读"
    # 数据操作（CRUD）
    - action: "create_issue"
      reason: "创建 Issue — 本地文件"
    - action: "edit_issue"
      reason: "编辑 Issue — 本地文件"
    - action: "delete_issue"
      reason: "删除 Issue — 本地文件"
    - action: "edit_settings"
      reason: "编辑 Settings — 本地配置"
    - action: "toggle_todo"
      reason: "Todo 勾选 — 本地文件"
    - action: "reopen_issue"
      reason: "Reopen Issue — 本地状态"
    - action: "mark_done_issue"
      reason: "Mark Done Issue — 本地状态"
    - action: "create_track"
      reason: "创建 Conductor Track — 本地文件"

  blocked:
    - action: "click_execute_todo"
      reason: "直接执行 D365 写操作"
    - action: "browser_snapshot"
      reason: "输出巨大（数百行 YAML），撑爆会话 context，导致 compact 丢失关键上下文"

# ============================================================
# Playwright 工具使用规则
# ============================================================
playwright:
  safe:
    - action: "browser_navigate"
      reason: "页面导航"
    - action: "browser_click"
      reason: "元素点击（需先查 ui.blocked）"
    - action: "browser_type"
      reason: "文本输入"
    - action: "browser_fill_form"
      reason: "表单填写"
    - action: "browser_select_option"
      reason: "下拉选择"
    - action: "browser_press_key"
      reason: "键盘操作"
    - action: "browser_take_screenshot"
      reason: "截图（保存为 JPEG 到文件，不传回会话）"
    - action: "browser_evaluate"
      reason: "JS 执行提取数据（推荐替代 snapshot）"
    - action: "browser_wait_for"
      reason: "等待元素/文本"
    - action: "browser_hover"
      reason: "鼠标悬停"
    - action: "browser_tabs"
      reason: "Tab 管理"
    - action: "browser_resize"
      reason: "窗口调整"
    - action: "browser_console_messages"
      reason: "控制台消息查看"
    - action: "browser_network_requests"
      reason: "网络请求查看"

  blocked:
    - action: "browser_snapshot"
      reason: "输出巨大，撑爆 context — 用 browser_evaluate 替代"

# ============================================================
# 注意事项
# ============================================================
notes:
  - "casework/patrol 会创建本地文件（case-summary.md、todo/*.md）— 需要 backup/restore"
  - "troubleshooter 需要 agency.exe 代理运行中"
  - "draft-email 生成的草稿在本地，不会自动发送"
  - "patrol 每个 case ~1-2 分钟，适合完整回归测试，不适合快速验证"
  - "截图必须保存为 JPEG 到文件（tests/results/screenshots/），绝不传回会话"
  - "需要网页信息时优先用 curl/WebFetch/browser_evaluate，不要 snapshot"
